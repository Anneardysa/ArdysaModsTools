# GitHub Actions Workflow: Sync Releases to R2 CDN
# Triggers after a release is published
# - Uploads release assets to Cloudflare R2
# - Updates releases.json manifest
# - Regenerates the What's New feed (config/whatsnew.json) from the releases list
# - Cleans up old releases to save storage

name: Sync Release to R2

on:
   release:
      types: [published]
   workflow_dispatch:
      inputs:
         tag:
            description: "Release tag to sync (e.g., v2.1.2)"
            required: true
            type: string
         cleanup_only:
            description: "Only cleanup old releases (skip upload)"
            required: false
            type: boolean
            default: false

env:
   R2_BUCKET: modspack-asset
   R2_RELEASES_PATH: releases
   CDN_BASE_URL: https://cdn.ardysamods.my.id
   # Number of releases to keep (others will be deleted)
   RELEASES_TO_KEEP: 3

permissions:
   contents: read

jobs:
   sync-to-r2:
      runs-on: ubuntu-latest

      steps:
         - name: Checkout Repository
           uses: actions/checkout@v4
           with:
              sparse-checkout: |
                 .github

         - name: Install Dependencies
           run: |
              set -e
              echo "Installing jq..."
              sudo apt-get update -qq
              sudo apt-get install -y -qq jq
              jq --version

              echo "Installing rclone..."
              curl -sO https://downloads.rclone.org/rclone-current-linux-amd64.zip
              unzip -q rclone-current-linux-amd64.zip
              sudo mv rclone-*-linux-amd64/rclone /usr/local/bin/
              rclone version

         - name: Configure rclone for R2
           run: |
              set -e
              mkdir -p ~/.config/rclone
              cat > ~/.config/rclone/rclone.conf << 'EOF'
              [r2]
              type = s3
              provider = Cloudflare
              access_key_id = ${{ secrets.R2_ACCESS_KEY_ID }}
              secret_access_key = ${{ secrets.R2_SECRET_ACCESS_KEY }}
              endpoint = ${{ secrets.R2_ENDPOINT }}
              acl = private
              no_check_bucket = true
              EOF

              echo "Testing R2 connection..."
              rclone lsd "r2:${{ env.R2_BUCKET }}" --max-depth 1 || echo "Warning: Could not list bucket root"

         - name: Get Release Info
           id: release
           run: |
              set -e

              if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
                TAG="${{ github.event.inputs.tag }}"
              else
                TAG="${{ github.event.release.tag_name }}"
              fi

              # Remove 'v' prefix for version
              VERSION="${TAG#v}"

              echo "TAG=$TAG" >> $GITHUB_OUTPUT
              echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
              echo "CLEANUP_ONLY=${{ github.event.inputs.cleanup_only || 'false' }}" >> $GITHUB_OUTPUT

              echo "📦 Release: $TAG (version: $VERSION)"

         - name: Download Release Assets
           if: steps.release.outputs.CLEANUP_ONLY != 'true'
           env:
              GH_TOKEN: ${{ github.token }}
           run: |
              set -e
              mkdir -p assets

              echo "Downloading assets for ${{ steps.release.outputs.TAG }}..."

              # Download release assets
              gh release download "${{ steps.release.outputs.TAG }}" \
                --repo "${{ github.repository }}" \
                --dir assets \
                --pattern "*.exe" --pattern "*.zip" \
                || { echo "⚠️ No matching assets found"; exit 0; }

              echo "📁 Downloaded assets:"
              ls -lah assets/ || echo "No files in assets/"

         - name: Detect Asset Files
           if: steps.release.outputs.CLEANUP_ONLY != 'true'
           id: assets
           run: |
              set -e

              # Find installer file
              INSTALLER_FILE=""
              if ls assets/*_Setup_*.exe 1>/dev/null 2>&1; then
                INSTALLER_FILE=$(ls assets/*_Setup_*.exe | head -1 | xargs basename)
              fi

              # Find portable file (try multiple patterns)
              PORTABLE_FILE=""
              for pattern in "AMT-v*.zip" "AMTv*.zip" "*_Portable_*.zip"; do
                if ls assets/$pattern 1>/dev/null 2>&1; then
                  PORTABLE_FILE=$(ls assets/$pattern | head -1 | xargs basename)
                  break
                fi
              done

              # SHA-256 of each asset for the ADR-0010 integrity gate (UpdaterService verifies the
              # downloaded file against installerSha256/portableSha256 before applying it).
              INSTALLER_SHA=""
              PORTABLE_SHA=""
              [ -n "$INSTALLER_FILE" ] && INSTALLER_SHA=$(sha256sum "assets/$INSTALLER_FILE" | cut -d' ' -f1)
              [ -n "$PORTABLE_FILE" ] && PORTABLE_SHA=$(sha256sum "assets/$PORTABLE_FILE" | cut -d' ' -f1)

              echo "INSTALLER_FILE=$INSTALLER_FILE" >> $GITHUB_OUTPUT
              echo "PORTABLE_FILE=$PORTABLE_FILE" >> $GITHUB_OUTPUT
              echo "INSTALLER_SHA=$INSTALLER_SHA" >> $GITHUB_OUTPUT
              echo "PORTABLE_SHA=$PORTABLE_SHA" >> $GITHUB_OUTPUT

              echo "🔍 Detected files:"
              echo "   Installer: ${INSTALLER_FILE:-'(none)'} (sha256: ${INSTALLER_SHA:-'(none)'})"
              echo "   Portable: ${PORTABLE_FILE:-'(none)'} (sha256: ${PORTABLE_SHA:-'(none)'})"

         - name: Upload Assets to R2
           if: steps.release.outputs.CLEANUP_ONLY != 'true'
           run: |
              set -e

              VERSION="${{ steps.release.outputs.VERSION }}"
              DEST_PATH="${{ env.R2_RELEASES_PATH }}/${VERSION}"

              # Check if we have any files to upload
              if [ -z "$(ls -A assets/ 2>/dev/null)" ]; then
                echo "⚠️ No assets to upload"
                exit 0
              fi

              echo "📤 Uploading to: r2:${{ env.R2_BUCKET }}/${DEST_PATH}/"

              rclone copy assets/ "r2:${{ env.R2_BUCKET }}/${DEST_PATH}/" \
                --progress \
                --stats 1s \
                -v

              echo "✅ Upload complete!"

         - name: Update releases.json Manifest
           if: steps.release.outputs.CLEANUP_ONLY != 'true'
           env:
              GH_TOKEN: ${{ github.token }}
           run: |
              set -eo pipefail

              VERSION="${{ steps.release.outputs.VERSION }}"
              CDN_BASE="${{ env.CDN_BASE_URL }}"
              RELEASES_PATH="${{ env.R2_RELEASES_PATH }}"
              INSTALLER_FILE="${{ steps.assets.outputs.INSTALLER_FILE }}"
              PORTABLE_FILE="${{ steps.assets.outputs.PORTABLE_FILE }}"
              INSTALLER_SHA="${{ steps.assets.outputs.INSTALLER_SHA }}"
              PORTABLE_SHA="${{ steps.assets.outputs.PORTABLE_SHA }}"

              # Guard: never write an entry or bump `latest` for a release with no installable assets.
              # An empty entry once became `latest` and made older clients offer a broken update.
              if [ -z "$INSTALLER_FILE" ] && [ -z "$PORTABLE_FILE" ]; then
                echo "⚠️ No installer/portable assets detected for $VERSION — skipping manifest update."
                exit 0
              fi

              echo "📝 Updating releases.json manifest..."

              # Get release notes from GitHub (truncate to 500 chars)
              NOTES=$(gh release view "${{ steps.release.outputs.TAG }}" \
                --repo "${{ github.repository }}" \
                --json body -q '.body' 2>/dev/null | head -c 500 || echo "")

              # Build number: highest build referenced in the notes (mirrors
              # AppVersion.ExtractBuildFromText — "(Build N)" or the end of a "builds X → Y" range).
              # Omitted (null) if none found; the client then falls back to parsing the notes itself.
              BUILD=$(printf '%s' "$NOTES" | grep -oiE 'builds?[^0-9]+[0-9]+([^0-9]+[0-9]+)*' | grep -oE '[0-9]+' | sort -rn | head -1 || true)
              BUILD_JSON="null"
              [ -n "$BUILD" ] && BUILD_JSON="$BUILD"
              echo "   Build: ${BUILD:-'(none)'}"

              # Download existing manifest or create new one
              echo "Downloading existing manifest..."
              MANIFEST_VALID=false

              if rclone cat "r2:${{ env.R2_BUCKET }}/${RELEASES_PATH}/releases.json" > manifest.json 2>/dev/null; then
                echo "Downloaded manifest from R2"
                echo "Raw content (first 200 chars):"
                head -c 200 manifest.json || true
                echo ""
                
                # Check if file is empty
                if [ ! -s manifest.json ]; then
                  echo "⚠️ Downloaded manifest is empty"
                elif ! jq empty manifest.json 2>/dev/null; then
                  echo "⚠️ Downloaded manifest is invalid JSON"
                elif ! jq -e '.releases' manifest.json >/dev/null 2>&1; then
                  echo "⚠️ Downloaded manifest missing 'releases' key"
                else
                  echo "✅ Existing manifest is valid"
                  MANIFEST_VALID=true
                fi
              else
                echo "No existing manifest on R2"
              fi

              # Create fresh manifest if needed
              if [ "$MANIFEST_VALID" = "false" ]; then
                echo "Creating fresh manifest..."
                echo '{"latest":"","releases":{}}' > manifest.json
              fi

              echo "Current manifest content:"
              cat manifest.json
              echo ""
              echo "Parsed JSON:"
              jq . manifest.json || echo "(failed to parse)"

              # Build URLs
              INSTALLER_URL=""
              PORTABLE_URL=""
              [ -n "$INSTALLER_FILE" ] && INSTALLER_URL="${CDN_BASE}/${RELEASES_PATH}/${VERSION}/${INSTALLER_FILE}"
              [ -n "$PORTABLE_FILE" ] && PORTABLE_URL="${CDN_BASE}/${RELEASES_PATH}/${VERSION}/${PORTABLE_FILE}"

              # Per-file manifest for incremental updates. Uploaded by release.yml (the job that has
              # the published tree); advertised here ONLY if it actually exists on R2 — a `files` URL
              # pointing at a 404 would make every client waste a request before falling back.
              # Additive field: clients that predate delta updates ignore it entirely.
              FILES_URL=""
              if rclone lsf "r2:${{ env.R2_BUCKET }}/${RELEASES_PATH}/${VERSION}/files.json" >/dev/null 2>&1; then
                FILES_URL="${CDN_BASE}/${RELEASES_PATH}/${VERSION}/files.json"
              fi

              echo "URLs:"
              echo "   Installer: ${INSTALLER_URL:-'(none)'}"
              echo "   Portable: ${PORTABLE_URL:-'(none)'}"
              echo "   Delta manifest: ${FILES_URL:-'(none — full download only)'}"

              # Update manifest using jq
              jq --arg ver "$VERSION" \
                 --arg inst "$INSTALLER_URL" \
                 --arg port "$PORTABLE_URL" \
                 --arg files "$FILES_URL" \
                 --arg notes "$NOTES" \
                 --arg isha "$INSTALLER_SHA" \
                 --arg psha "$PORTABLE_SHA" \
                 --argjson build "$BUILD_JSON" \
                 --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
                 '
                 .latest = $ver |
                 .releases[$ver] = {
                   "version": $ver,
                   "date": $date,
                   "build": $build,
                   "installer": (if $inst == "" then null else $inst end),
                   "portable": (if $port == "" then null else $port end),
                   "installerSha256": (if $isha == "" then null else $isha end),
                   "portableSha256": (if $psha == "" then null else $psha end),
                   "files": (if $files == "" then null else $files end),
                   "notes": (if $notes == "" then null else $notes end)
                 }
                 ' manifest.json > updated_manifest.json

              # Validate the new manifest
              echo "Validating updated manifest..."
              if ! jq empty updated_manifest.json; then
                echo "❌ Generated manifest is invalid JSON!"
                cat updated_manifest.json
                exit 1
              fi

              echo "✅ Manifest is valid JSON"
              echo "Updated manifest:"
              jq . updated_manifest.json

              # Upload manifest
              echo "Uploading manifest to R2..."
              rclone copyto updated_manifest.json "r2:${{ env.R2_BUCKET }}/${RELEASES_PATH}/releases.json" -v

              echo "✅ Manifest updated successfully!"

         - name: Generate and Upload whatsnew.json Feed
           if: steps.release.outputs.CLEANUP_ONLY != 'true'
           env:
              GH_TOKEN: ${{ github.token }}
           run: |
              set -eo pipefail

              echo "📝 Generating What's New feed (config/whatsnew.json)..."

              # Mirrors scripts/release/generate-whatsnew.ps1 (which is gitignored, so it can't run on the
              # runner). Snapshots the releases list into the exact shape WhatsNewService.Parse reads
              # (tag_name, name, body, html_url, draft, published_at), newest-first, drafts excluded.
              gh api "repos/${{ github.repository }}/releases?per_page=30" \
                | jq '[.[] | select(.draft == false)
                       | {tag_name, name, body, html_url, draft, published_at}]' \
                > whatsnew.json

              # Validate before publishing
              if ! jq -e 'type == "array"' whatsnew.json >/dev/null; then
                echo "❌ Generated whatsnew.json is not a JSON array"
                cat whatsnew.json
                exit 1
              fi

              echo "✅ Feed has $(jq 'length' whatsnew.json) release(s)"

              # Publish to R2 (served at ${{ env.CDN_BASE_URL }}/config/whatsnew.json — the
              # WhatsNewFeedUrl default the app reads first).
              rclone copyto whatsnew.json "r2:${{ env.R2_BUCKET }}/config/whatsnew.json" -v

              echo "✅ whatsnew.json published"

         - name: Cleanup Old Releases
           id: cleanup
           run: |
              set -eo pipefail

              RELEASES_PATH="${{ env.R2_RELEASES_PATH }}"
              KEEP="${{ env.RELEASES_TO_KEEP }}"

              echo "🧹 Cleaning up old releases (keeping $KEEP most recent)..."

              # Get list of all version directories in R2
              echo "Fetching release list from R2..."
              VERSIONS=$(rclone lsd "r2:${{ env.R2_BUCKET }}/${RELEASES_PATH}/" 2>/dev/null | awk '{print $NF}' | sort -V || echo "")

              if [ -z "$VERSIONS" ]; then
                echo "No versions found on R2"
                echo "DELETED_COUNT=0" >> $GITHUB_OUTPUT
                exit 0
              fi

              # Count total versions
              TOTAL=$(echo "$VERSIONS" | wc -l)
              echo "Found $TOTAL versions on R2"

              if [ "$TOTAL" -le "$KEEP" ]; then
                echo "✅ Only $TOTAL versions exist, keeping all (threshold: $KEEP)"
                echo "DELETED_COUNT=0" >> $GITHUB_OUTPUT
                exit 0
              fi

              # Calculate how many to delete
              DELETE_COUNT=$((TOTAL - KEEP))
              echo "Will delete $DELETE_COUNT old versions"

              # Get the oldest versions to delete
              TO_DELETE=$(echo "$VERSIONS" | head -n $DELETE_COUNT)

              echo "Versions to delete:"
              echo "$TO_DELETE"

              # Delete each old version
              DELETED=0
              for VERSION in $TO_DELETE; do
                echo "🗑️ Deleting version: $VERSION"
                if rclone purge "r2:${{ env.R2_BUCKET }}/${RELEASES_PATH}/${VERSION}/" -v; then
                  DELETED=$((DELETED + 1))
                  echo "   ✅ Deleted $VERSION"
                else
                  echo "   ⚠️ Failed to delete $VERSION"
                fi
              done

              echo "DELETED_COUNT=$DELETED" >> $GITHUB_OUTPUT
              echo "✅ Cleanup complete! Deleted $DELETED old versions"

              # Update manifest to remove deleted versions
              if [ "$DELETED" -gt 0 ]; then
                echo "Updating manifest to remove deleted versions..."
                
                # Download current manifest
                rclone cat "r2:${{ env.R2_BUCKET }}/${RELEASES_PATH}/releases.json" > cleanup_manifest.json 2>/dev/null || echo '{}' > cleanup_manifest.json
                
                # Remove deleted versions from manifest
                for VERSION in $TO_DELETE; do
                  echo "Removing $VERSION from manifest"
                  jq --arg ver "$VERSION" 'del(.releases[$ver])' cleanup_manifest.json > temp_manifest.json
                  mv temp_manifest.json cleanup_manifest.json
                done
                
                # Validate and upload
                if jq empty cleanup_manifest.json 2>/dev/null; then
                  rclone copyto cleanup_manifest.json "r2:${{ env.R2_BUCKET }}/${RELEASES_PATH}/releases.json" -v
                  echo "✅ Manifest cleaned up"
                fi
              fi

         - name: Verify Upload
           run: |
              set -e

              VERSION="${{ steps.release.outputs.VERSION }}"
              RELEASES_PATH="${{ env.R2_RELEASES_PATH }}"

              echo "🔍 Verifying files on R2..."
              echo ""
              echo "Files for version $VERSION:"
              rclone ls "r2:${{ env.R2_BUCKET }}/${RELEASES_PATH}/${VERSION}/" 2>/dev/null || echo "(no files or version doesn't exist)"

              echo ""
              echo "All versions on R2:"
              rclone lsd "r2:${{ env.R2_BUCKET }}/${RELEASES_PATH}/" 2>/dev/null | awk '{print "  - " $NF}' || echo "(none)"

              echo ""
              echo "Current manifest:"
              rclone cat "r2:${{ env.R2_BUCKET }}/${RELEASES_PATH}/releases.json" 2>/dev/null | jq . || echo "(no manifest found)"

         - name: Summary
           run: |
              VERSION="${{ steps.release.outputs.VERSION }}"
              CDN_BASE="${{ env.CDN_BASE_URL }}"
              DELETED="${{ steps.cleanup.outputs.DELETED_COUNT || '0' }}"

              echo "## 🚀 Release Sync Complete!" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
              echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
              echo "| **Version** | \`${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
              echo "| **Old Releases Cleaned** | ${DELETED} |" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### 🔗 CDN URLs" >> $GITHUB_STEP_SUMMARY
              echo "- **Manifest**: [\`releases.json\`](${CDN_BASE}/releases/releases.json)" >> $GITHUB_STEP_SUMMARY
              echo "- **What's New feed**: [\`whatsnew.json\`](${CDN_BASE}/config/whatsnew.json)" >> $GITHUB_STEP_SUMMARY
              echo "- **Release folder**: [\`${VERSION}/\`](${CDN_BASE}/releases/${VERSION}/)" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### 📋 Manifest Content" >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
              rclone cat "r2:${{ env.R2_BUCKET }}/${{ env.R2_RELEASES_PATH }}/releases.json" 2>/dev/null | jq . >> $GITHUB_STEP_SUMMARY || echo "{}" >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
