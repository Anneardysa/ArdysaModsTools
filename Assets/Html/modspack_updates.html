<!doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <link
         href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
         rel="stylesheet"
      />
      <style>
         * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
         }
         :root {
            --canvas: #000000;
            --panel: rgba(10, 10, 10, 0.9);
            --panel-2: #050505;
            --panel-hover: rgba(20, 20, 20, 0.95);
            --hairline: #222222;
            --hairline-strong: #333333;
            --primary: #ffffff;
            --on-primary: #000000;
            --primary-glow: rgba(255, 255, 255, 0.16);
            --accent-dim: rgba(255, 255, 255, 0.1);
            --ink: #ffffff;
            --body: #888888;
            --mute: #444444;
            --sans: "JetBrains Mono", SFMono-Regular, Menlo, Consolas, monospace;
            --transition: all 0.18s ease;
         }
         html,
         body {
            height: 100%;
         }
         body {
            font-family: var(--sans);
            background: var(--canvas);
            background-image:
               linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
               linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--ink);
            font-size: 14px;
            overflow: hidden;
            user-select: none;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--hairline-strong);
         }

         /* title bar */
         #titlebar {
            height: 40px;
            min-height: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 6px 0 16px;
            border-bottom: 1px solid var(--hairline);
            background: rgba(0, 0, 0, 0.6);
            -webkit-app-region: drag;
         }
         .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
         }
         .brand .glyph {
            display: flex;
            color: var(--primary);
         }
         .brand .glyph svg {
            width: 14px;
            height: 14px;
         }
         .brand .b-name::before {
            content: "// ";
            color: var(--mute);
         }
         .brand .b-ver {
            margin-left: 4px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--on-primary);
            background: var(--primary);
            padding: 2px 6px;
         }
         .win-controls {
            margin-left: auto;
            display: flex;
            gap: 2px;
         }
         .win-btn {
            -webkit-app-region: no-drag;
            width: 32px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: 1px solid transparent;
            color: var(--mute);
            cursor: pointer;
            transition: var(--transition);
         }
         .win-btn svg {
            width: 14px;
            height: 14px;
         }
         .win-btn.close:hover {
            background: rgba(248, 81, 73, 0.85);
            color: #fff;
         }

         /* controls */
         .controls {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--hairline);
            background: rgba(0, 0, 0, 0.4);
            flex-wrap: wrap;
         }
         .search {
            position: relative;
            flex: 1;
            min-width: 150px;
         }
         .search svg {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 13px;
            height: 13px;
            color: var(--mute);
            pointer-events: none;
         }
         #search-input {
            width: 100%;
            padding: 8px 10px 8px 30px;
            background: var(--panel-2);
            border: 1px solid var(--hairline-strong);
            color: var(--ink);
            font-family: var(--sans);
            font-size: 12px;
            letter-spacing: 0.3px;
            outline: none;
            transition: var(--transition);
         }
         #search-input::placeholder {
            color: var(--mute);
         }
         #search-input:focus {
            border-color: var(--primary);
         }
         .filters {
            display: flex;
            gap: 4px;
         }
         .chip {
            -webkit-app-region: no-drag;
            min-width: 34px;
            padding: 7px 10px;
            background: var(--panel-2);
            border: 1px solid var(--hairline-strong);
            color: var(--body);
            font-family: var(--sans);
            font-size: 10.5px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: var(--transition);
         }
         .chip:hover {
            color: var(--ink);
            border-color: var(--primary);
         }
         .chip.active {
            background: var(--primary);
            border-color: var(--primary);
            color: var(--on-primary);
         }

         /* grid */
         .grid {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 16px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            grid-auto-rows: 170px;
            gap: 12px;
            align-content: start;
         }
         .card {
            position: relative;
            overflow: hidden;
            border: 1px solid var(--hairline-strong);
            background: var(--panel-2);
            transition: var(--transition);
         }
         .card::before,
         .card::after {
            content: "";
            position: absolute;
            width: 8px;
            height: 8px;
            z-index: 3;
            opacity: 0.6;
            transition: var(--transition);
         }
         .card::before {
            top: -1px;
            left: -1px;
            border-top: 1px solid var(--ink);
            border-left: 1px solid var(--ink);
         }
         .card::after {
            bottom: -1px;
            right: -1px;
            border-bottom: 1px solid var(--ink);
            border-right: 1px solid var(--ink);
         }
         .card:hover {
            border-color: var(--primary);
            box-shadow: 0 0 16px var(--primary-glow);
         }
         .card:hover::before,
         .card:hover::after {
            width: 12px;
            height: 12px;
            opacity: 1;
         }
         .card img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) contrast(1.05);
            transition: transform 0.5s ease, filter 0.3s ease;
            z-index: 0;
         }
         .card:hover img {
            transform: scale(1.07);
            filter: grayscale(0%);
         }
         .card .ph {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--mute);
            z-index: 0;
         }
         .card .ph svg {
            width: 30px;
            height: 30px;
         }
         .card .veil {
            position: absolute;
            inset: 0;
            z-index: 1;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.05) 35%, rgba(0, 0, 0, 0.9) 100%);
         }
         .card .meta {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 2;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
         }
         .card .attr {
            align-self: flex-start;
            font-size: 8.5px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--ink);
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid var(--hairline-strong);
            padding: 1px 5px;
         }
         .card .hero {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.9);
            line-height: 1.2;
         }

         /* loading / error / empty state */
         .state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            color: var(--body);
            font-size: 12px;
            letter-spacing: 0.5px;
            text-align: center;
            padding: 24px;
         }
         .spinner {
            width: 26px;
            height: 26px;
            border: 2px solid var(--hairline-strong);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
         }
         @keyframes spin {
            to {
               transform: rotate(360deg);
            }
         }
         .state-action {
            display: none;
            -webkit-app-region: no-drag;
            align-items: center;
            gap: 8px;
            padding: 9px 18px;
            font-family: var(--sans);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--ink);
            background: none;
            border: 1px solid var(--hairline-strong);
            cursor: pointer;
            transition: var(--transition);
         }
         .state-action:hover {
            background: var(--accent-dim);
            border-color: var(--primary);
         }

         /* footer */
         .footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 18px;
            border-top: 1px solid var(--hairline);
            background: rgba(0, 0, 0, 0.45);
         }
         .footer .count {
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--mute);
         }
         .footer-link {
            -webkit-app-region: no-drag;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            font-size: 10.5px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--body);
            background: none;
            border: none;
            cursor: pointer;
            transition: var(--transition);
         }
         .footer-link svg {
            width: 13px;
            height: 13px;
         }
         .footer-link:hover {
            color: var(--ink);
         }

         ::-webkit-scrollbar {
            width: 8px;
         }
         ::-webkit-scrollbar-track {
            background: transparent;
         }
         ::-webkit-scrollbar-thumb {
            background: var(--hairline);
         }
         ::-webkit-scrollbar-thumb:hover {
            background: var(--hairline-strong);
         }
      </style>
   </head>
   <body>
      <header id="titlebar" onmousedown="maybeDrag(event)">
         <div class="brand">
            <span class="glyph">
               <svg viewBox="0 0 24 24" fill="currentColor">
                  <path d="M12 2l2.4 5 5.6.8-4 4 1 5.5L12 19.8 6.9 22.3l1-5.5-4-4 5.6-.8z" />
               </svg>
            </span>
            <span class="b-name">ModsPack</span>
            <span id="brand-ver" class="b-ver" style="display: none"></span>
         </div>
         <div class="win-controls">
            <button class="win-btn close" title="Close" onclick="act('close')">
               <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <line x1="6" y1="6" x2="18" y2="18" />
                  <line x1="18" y1="6" x2="6" y2="18" />
               </svg>
            </button>
         </div>
      </header>

      <div id="controls" class="controls" style="display: none">
         <div class="search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
               <circle cx="11" cy="11" r="7" />
               <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input id="search-input" type="text" placeholder="Search hero…" autocomplete="off" />
         </div>
         <div class="filters">
            <button class="chip active" data-filter="all" title="All">ALL</button>
            <button class="chip" data-filter="Strength" title="Strength">STR</button>
            <button class="chip" data-filter="Agility" title="Agility">AGI</button>
            <button class="chip" data-filter="Intelligence" title="Intelligence">INT</button>
            <button class="chip" data-filter="Universal" title="Universal">UNI</button>
         </div>
      </div>

      <div id="state" class="state">
         <div id="state-spin" class="spinner"></div>
         <div id="state-text">Loading ModsPack updates…</div>
         <button id="state-action" class="state-action" onclick="openUrl('https://ardysamods.my.id/updates.html')">
            Open on the web
         </button>
      </div>

      <div id="grid" class="grid" style="display: none"></div>

      <footer class="footer">
         <span id="count" class="count"></span>
         <button class="footer-link" onclick="openUrl('https://ardysamods.my.id/updates.html')">
            View all updates
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
               <path d="M7 17 17 7" />
               <polyline points="9 7 17 7 17 15" />
            </svg>
         </button>
      </footer>

      <script>
         "use strict";
         function sendMessage(d) {
            if (window.chrome && window.chrome.webview) window.chrome.webview.postMessage(d);
         }
         function act(type) {
            sendMessage({ type });
         }
         function openUrl(url) {
            sendMessage({ type: "openUrl", url });
         }
         function maybeDrag(ev) {
            if (ev.target.closest(".win-btn")) return;
            sendMessage({ type: "startDrag" });
         }
         document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") act("close");
         });

         /* ── state ── */
         let _all = [];
         let _filter = "all";
         let _search = "";

         /* ── C# → JS: set the ModsPack version badge in the title bar ── */
         function setModspackVersion(v) {
            const el = document.getElementById("brand-ver");
            if (!el || !v) return;
            el.textContent = "v" + String(v).replace(/^v/i, "");
            el.style.display = "inline-block";
         }

         /* ── C# → JS: render the updates grid ── */
         function loadUpdates(payload) {
            const items = typeof payload === "string" ? JSON.parse(payload) : payload;
            if (!Array.isArray(items) || items.length === 0) {
               showFallback();
               return;
            }
            _all = items;
            document.getElementById("state").style.display = "none";
            document.getElementById("controls").style.display = "flex";
            document.getElementById("grid").style.display = "grid";
            render();
         }

         function render() {
            const grid = document.getElementById("grid");
            const s = _search.toLowerCase();
            const filtered = _all.filter((u) => {
               const okFilter = _filter === "all" || (u.attribute && u.attribute === _filter);
               const okSearch = !s || (u.hero || "").toLowerCase().includes(s);
               return okFilter && okSearch;
            });

            grid.innerHTML = "";
            if (filtered.length === 0) {
               const empty = document.createElement("div");
               empty.style.cssText =
                  "grid-column:1/-1;text-align:center;color:var(--mute);padding:40px;font-size:12px;letter-spacing:0.5px;";
               empty.textContent = "No heroes match your search.";
               grid.appendChild(empty);
            } else {
               filtered.forEach((u) => grid.appendChild(buildCard(u)));
            }

            document.getElementById("count").textContent =
               filtered.length + " / " + _all.length + " heroes";
         }

         function buildCard(u) {
            const card = document.createElement("div");
            card.className = "card";

            if (u.image) {
               const img = document.createElement("img");
               img.alt = u.hero || "";
               img.loading = "lazy";
               img.src = u.image;
               img.onerror = function () {
                  this.remove();
                  card.insertAdjacentHTML(
                     "afterbegin",
                     '<div class="ph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg></div>'
                  );
               };
               card.appendChild(img);
            } else {
               card.insertAdjacentHTML(
                  "beforeend",
                  '<div class="ph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg></div>'
               );
            }

            const veil = document.createElement("div");
            veil.className = "veil";
            card.appendChild(veil);

            const meta = document.createElement("div");
            meta.className = "meta";
            if (u.attribute) {
               const a = document.createElement("span");
               a.className = "attr";
               a.textContent = u.attribute;
               meta.appendChild(a);
            }
            const h = document.createElement("div");
            h.className = "hero";
            h.textContent = u.hero || "";
            meta.appendChild(h);
            card.appendChild(meta);

            return card;
         }

         function showFallback() {
            document.getElementById("grid").style.display = "none";
            document.getElementById("controls").style.display = "none";
            const state = document.getElementById("state");
            state.style.display = "flex";
            document.getElementById("state-spin").style.display = "none";
            document.getElementById("state-text").textContent =
               "Couldn't load ModsPack updates — check your connection.";
            document.getElementById("state-action").style.display = "inline-flex";
         }

         /* ── filter + search wiring ── */
         document.getElementById("search-input").addEventListener("input", (e) => {
            _search = e.target.value.trim();
            render();
         });
         document.querySelectorAll(".chip").forEach((btn) => {
            btn.addEventListener("click", () => {
               document.querySelectorAll(".chip").forEach((b) => b.classList.remove("active"));
               btn.classList.add("active");
               _filter = btn.getAttribute("data-filter");
               render();
            });
         });
      </script>
   </body>
</html>
