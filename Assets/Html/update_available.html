<!doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Update Available - AMT 2.0</title>
      <style>
         * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
         }

         /* Monochrome design system — mirrors whatsnew.html / main_shell.html:
            white primary on black, JetBrains Mono, hairline borders, square corners. */
         :root {
            --canvas: #000000;
            --panel: #050505;
            --panel-hover: rgba(20, 20, 20, 0.95);
            --hairline: #222222;
            --hairline-strong: #333333;
            --primary: #ffffff;
            --on-primary: #000000;
            --accent-dim: rgba(255, 255, 255, 0.1);
            --ink: #ffffff;
            --body: #888888;
            --mute: #444444;
            --danger: #f85149;
            --sans: "JetBrains Mono", SFMono-Regular, Menlo, Consolas, monospace;
            --transition: all 0.18s ease;
         }

         html,
         body {
            height: 100%;
         }

         body {
            font-family: var(--sans);
            background: var(--canvas);
            background-image:
               linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
               linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--ink);
            font-size: 14px;
            display: flex;
            flex-direction: column;
            user-select: none;
            overflow: hidden;
            border: 1px solid var(--hairline-strong);
         }

         /* ── title bar ── */
         #titlebar {
            height: 40px;
            min-height: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 6px 0 16px;
            border-bottom: 1px solid var(--hairline);
            background: rgba(0, 0, 0, 0.6);
            -webkit-app-region: drag;
         }
         .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
         }
         .brand .glyph {
            display: flex;
            color: var(--primary);
         }
         .brand .glyph svg {
            width: 14px;
            height: 14px;
         }
         .brand .b-name::before {
            content: "// ";
            color: var(--mute);
         }
         .win-controls {
            margin-left: auto;
            display: flex;
            gap: 2px;
         }
         .win-btn {
            -webkit-app-region: no-drag;
            width: 32px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: 1px solid transparent;
            color: var(--mute);
            cursor: pointer;
            transition: var(--transition);
         }
         .win-btn svg {
            width: 14px;
            height: 14px;
         }
         .win-btn.close:hover {
            background: rgba(248, 81, 73, 0.85);
            color: #fff;
         }

         /* ── scrollable body ── */
         .container {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* safe center: centered when it fits, top-aligned + scrollable when too tall at
               high DPI, so the download cards are never clipped. */
            justify-content: safe center;
            padding: 26px 26px 22px;
         }

         @keyframes fadeInUp {
            from {
               opacity: 0;
               transform: translateY(6px);
            }
            to {
               opacity: 1;
               transform: translateY(0);
            }
         }

         /* Badge */
         .badge {
            display: inline-block;
            padding: 4px 12px;
            border: 1px solid var(--primary);
            color: var(--primary);
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 12px;
         }

         /* Title */
         .title {
            font-size: 14px;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: 0.5px;
            text-align: center;
            margin-bottom: 18px;
         }

         /* Version info */
         .version-info {
            width: 100%;
            background: var(--panel);
            border: 1px solid var(--hairline-strong);
            padding: 6px 16px;
            margin-bottom: 20px;
            animation: fadeInUp 0.25s ease-out;
         }
         .version-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
         }
         .version-row + .version-row {
            border-top: 1px solid var(--hairline);
         }
         .version-label {
            font-size: 10px;
            color: var(--mute);
            text-transform: uppercase;
            letter-spacing: 1px;
         }
         .version-value {
            font-size: 12px;
            font-weight: 700;
            color: var(--body);
            letter-spacing: 0.3px;
         }
         .version-value.latest {
            color: var(--ink);
         }

         /* Delta check — installer installs open delta-first; this holds the spot the
            "Update Now" card (or, failing that, the download links) will take. */
         .delta-check {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 16px;
            background: var(--panel);
            border: 1px solid var(--hairline-strong);
            font-size: 10.5px;
            color: var(--body);
            letter-spacing: 0.5px;
         }
         .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid var(--hairline-strong);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
         }
         @keyframes spin {
            to {
               transform: rotate(360deg);
            }
         }

         /* Section label */
         .section-label {
            width: 100%;
            font-size: 9px;
            color: var(--mute);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            text-align: center;
         }

         /* Download cards */
         .download-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
         }
         .download-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            background: var(--panel);
            border: 1px solid var(--hairline-strong);
            cursor: pointer;
            transition: var(--transition);
            -webkit-app-region: no-drag;
         }
         .download-card:hover {
            background: var(--panel-hover);
            border-color: var(--body);
         }
         .download-card .card-icon {
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border: 1px solid var(--hairline-strong);
            color: var(--body);
         }
         .download-card:hover .card-icon {
            color: var(--ink);
         }
         .download-card .card-icon svg {
            width: 17px;
            height: 17px;
         }
         .card-info {
            flex: 1;
            min-width: 0;
         }
         .card-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: 0.3px;
         }
         .card-desc {
            font-size: 10px;
            color: var(--mute);
            margin-top: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
         }
         .card-arrow {
            color: var(--mute);
            flex-shrink: 0;
         }
         .download-card:hover .card-arrow {
            color: var(--body);
         }
         .card-arrow svg {
            width: 14px;
            height: 14px;
         }

         /* Incremental update — the primary action, filled white */
         .download-card.primary {
            background: var(--primary);
            border-color: var(--primary);
         }
         .download-card.primary:hover {
            background: #e8e8e8;
            border-color: #e8e8e8;
         }
         .download-card.primary .card-title,
         .download-card.primary .card-desc,
         .download-card.primary .card-arrow,
         .download-card.primary .card-icon {
            color: var(--on-primary);
         }
         .download-card.primary .card-icon {
            border-color: rgba(0, 0, 0, 0.25);
         }
         .download-card.primary .card-desc {
            opacity: 0.7;
         }

         /* Download / apply progress */
         .progress-box {
            width: 100%;
            background: var(--panel);
            border: 1px solid var(--hairline-strong);
            padding: 14px 16px;
            margin-bottom: 16px;
         }
         .progress-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: 0.5px;
            margin-bottom: 12px;
         }
         .progress-track {
            width: 100%;
            height: 6px;
            background: var(--accent-dim);
            overflow: hidden;
         }
         .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--primary);
            transition: width 0.2s linear;
         }
         .progress-text {
            font-size: 10px;
            color: var(--mute);
            margin-top: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
         }

         /* Error line */
         .error-line {
            width: 100%;
            font-size: 10px;
            color: var(--danger);
            text-align: center;
            margin-bottom: 12px;
            letter-spacing: 0.3px;
         }

         /* ── footer ── */
         .footer {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 10px 16px;
            border-top: 1px solid var(--hairline);
            background: rgba(0, 0, 0, 0.45);
         }
         .btn-cancel {
            -webkit-app-region: no-drag;
            padding: 8px 18px;
            font-family: var(--sans);
            font-size: 10.5px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            border: 1px solid var(--hairline-strong);
            background: none;
            color: var(--body);
            transition: var(--transition);
         }
         .btn-cancel:hover {
            color: var(--ink);
            border-color: var(--body);
            background: var(--accent-dim);
         }

         ::-webkit-scrollbar {
            width: 8px;
         }
         ::-webkit-scrollbar-track {
            background: transparent;
         }
         ::-webkit-scrollbar-thumb {
            background: var(--hairline);
         }
         ::-webkit-scrollbar-thumb:hover {
            background: var(--hairline-strong);
         }
      </style>
   </head>

      <header id="titlebar" onmousedown="maybeDrag(event)">
         <div class="brand">
            <span class="glyph">
               <svg viewBox="0 0 1000 1000" fill="currentColor" aria-label="Ardysa"><use href="#ardysaGlyph" /></svg>
            </span>
            <span class="b-name" data-i18n="update.available.title">Update Available</span>
         </div>
         <div class="win-controls">
            <button class="win-btn close" title="Close" data-i18n-title="common.close" onclick="notNow()">
               <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <line x1="6" y1="6" x2="18" y2="18" />
                  <line x1="18" y1="6" x2="6" y2="18" />
               </svg>
            </button>
         </div>
      </header>

      <div class="container">
         <!-- Badge -->
         <div class="badge" data-i18n="updateAvail.badge">[ UPDATE AVAILABLE ]</div>

         <!-- Title -->
         <div class="title" data-i18n="updateAvail.title">A NEW VERSION IS AVAILABLE</div>

         <!-- Version info -->
         <div class="version-info">
            <div class="version-row">
               <span class="version-label" data-i18n="updateAvail.current">Current</span>
               <span class="version-value" id="currentVersion">--</span>
            </div>
            <div class="version-row">
               <span class="version-label" data-i18n="updateAvail.latest">Latest</span>
               <span class="version-value latest" id="latestVersion">--</span>
            </div>
            <div class="version-row">
               <span class="version-label" data-i18n="updateAvail.type">Type</span>
               <span class="version-value" id="updateType">--</span>
            </div>
         </div>

         <!-- Delta check (installer installs open delta-first: links hidden while this runs) -->
         <div class="delta-check" id="deltaCheck" style="display: none">
            <div class="spinner"></div>
            <span data-i18n="updateAvail.checking">Calculating update size…</span>
         </div>

         <!-- Incremental update (revealed once the diff says one is possible) -->
         <div class="download-section" id="deltaSection" style="display: none">
            <div class="download-card primary" onclick="applyUpdate()" id="deltaCard">
               <div class="card-icon">
                  <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                     <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                  </svg>
               </div>
               <div class="card-info">
                  <div class="card-title" id="deltaTitle">Update Now</div>
                  <div class="card-desc" id="deltaDesc">Downloads only what changed</div>
               </div>
               <div class="card-arrow">
                  <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                     <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                  </svg>
               </div>
            </div>
         </div>

         <!-- Progress (replaces the cards while the update downloads) -->
         <div class="progress-box" id="progressBox" style="display: none">
            <div class="progress-title" id="progressTitle">Downloading update...</div>
            <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
            <div class="progress-text" id="progressText">&nbsp;</div>
         </div>

         <div class="error-line" id="errorLine" style="display: none"></div>

         <!-- Download section -->
         <div class="section-label" id="downloadLabel" data-i18n="updateAvail.downloadSection">Download Latest Version</div>

         <div class="download-section" id="fullSection">
            <!-- CDN Link -->
            <div class="download-card" onclick="openLink('cdn')" id="cdnCard">
               <div class="card-icon">
                  <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                     <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z" />
                  </svg>
               </div>
               <div class="card-info">
                  <div class="card-title" data-i18n="updateAvail.cdnTitle">CDN Server</div>
                  <div class="card-desc" id="cdnDesc">cdn.ardysamods.my.id</div>
               </div>
               <div class="card-arrow">
                  <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">

                  </svg>
               </div>
            </div>
         </div>
      </div>

      <!-- Footer -->
      <footer class="footer">
         <button class="btn-cancel" id="btnCancel" onclick="notNow()" data-i18n="updateAvail.notNow">Not Now</button>
      </footer>

      <script>
         "use strict";
         let cdnLink = "";
         let githubLink = "";

         function setUpdateInfo(data) {
            document.getElementById("currentVersion").textContent = data.currentVersion || "--";
            document.getElementById("latestVersion").textContent = data.latestVersion || "--";
            document.getElementById("updateType").textContent = data.updateType || "--";
            cdnLink = data.cdnUrl || "";
            githubLink = data.githubUrl || "";

            if (data.cdnFilename) {
               document.getElementById("cdnDesc").textContent = data.cdnFilename;
            }
            if (data.githubFilename) {
               document.getElementById("githubDesc").textContent = data.githubFilename;
            }

            // Delta-first (installer installs): hide the full-download links while the host diffs
            // the install tree. Exactly one of setDeltaOffer / setDeltaUnavailable ends this state;
            // the timer is the backstop so the user is never stranded with no action at all.
            if (data.deltaPending) {
               document.getElementById("deltaCheck").style.display = "flex";
               document.getElementById("fullSection").style.display = "none";
               document.getElementById("downloadLabel").style.display = "none";
               deltaTimer = setTimeout(setDeltaUnavailable, 45000);
            }
         }

         function openLink(source) {
            const url = source === "cdn" ? cdnLink : githubLink;
            if (url) {
               sendMessage({ type: "openLink", url: url });
            }
         }

         // ── Incremental update ────────────────────────────────────────────────
         // The host reveals this only after the diff succeeds; until then (and whenever it
         // fails) the full-download cards below are the only offer, exactly as before.

         let applying = false;
         let deltaTimer = null;

         function endDeltaCheck() {
            if (deltaTimer) {
               clearTimeout(deltaTimer);
               deltaTimer = null;
            }
            document.getElementById("deltaCheck").style.display = "none";
         }

         function setDeltaOffer(title, desc) {
            endDeltaCheck();
            document.getElementById("deltaTitle").textContent = title;
            document.getElementById("deltaDesc").textContent = desc;
            document.getElementById("deltaSection").style.display = "flex";
         }

         function setDeltaUnavailable() {
            endDeltaCheck();
            document.getElementById("fullSection").style.display = "flex";
            document.getElementById("downloadLabel").style.display = "block";
         }

         function applyUpdate() {
            if (applying) return;
            applying = true;
            sendMessage({ type: "applyUpdate" });
         }

         function setUpdateBusy(title) {
            document.getElementById("progressTitle").textContent = title;
            document.getElementById("progressBox").style.display = "block";
            document.getElementById("deltaSection").style.display = "none";
            document.getElementById("fullSection").style.display = "none";
            document.getElementById("downloadLabel").style.display = "none";
            document.getElementById("errorLine").style.display = "none";
            // "Not Now" would silently cancel the download it sits under — the X (and ESC) stay as
            // the deliberate way out.
            document.getElementById("btnCancel").style.display = "none";
         }

         function setUpdateProgress(percent) {
            document.getElementById("progressFill").style.width = Math.max(0, Math.min(100, percent)) + "%";
         }

         function setUpdateStatus(text) {
            document.getElementById("progressText").textContent = text;
         }

         function setUpdateFailed(message) {
            applying = false;
            document.getElementById("progressBox").style.display = "none";
            document.getElementById("fullSection").style.display = "flex";
            document.getElementById("downloadLabel").style.display = "block";
            document.getElementById("btnCancel").style.display = "block";
            const error = document.getElementById("errorLine");
            error.textContent = message;
            error.style.display = "block";
         }

         function notNow() {
            sendMessage({ type: "notNow" });
         }

         function maybeDrag(ev) {
            if (ev.target.closest(".win-btn")) return;
            sendMessage({ type: "startDrag" });
         }

         function startDrag() {
            sendMessage({ type: "startDrag" });
         }

         function sendMessage(data) {
            if (window.chrome && window.chrome.webview) {
               window.chrome.webview.postMessage(data);
            }
         }
      </script>
   </body>
</html>
