<!doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <link
         href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
         rel="stylesheet"
      />
      <style>
         * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
         }

         /* ── ardysamods.my.id monochrome tokens (shared with main_shell) ── */
         :root {
            --canvas: #000000;
            --panel: rgba(10, 10, 10, 0.9);
            --panel-2: #050505;
            --panel-hover: rgba(20, 20, 20, 0.95);
            --hairline: #222222;
            --hairline-strong: #333333;
            --primary: #ffffff;
            --on-primary: #000000;
            --primary-glow: rgba(255, 255, 255, 0.16);
            --accent-dim: rgba(255, 255, 255, 0.1);
            --ink: #ffffff;
            --body: #888888;
            --mute: #444444;
            --danger: #f85149;
            --sans: "JetBrains Mono", SFMono-Regular, Menlo, Consolas, monospace;
            --clip: 12px;
            --transition: all 0.18s ease;
         }

         html,
         body {
            height: 100%;
         }
         body {
            font-family: var(--sans);
            background: var(--canvas);
            background-image:
               linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
               linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--ink);
            font-size: 14px;
            overflow: hidden;
            user-select: none;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--hairline-strong);
         }

         /* cut-corner notch utility */
         .notch {
            position: relative;
         }
         .notch::before {
            content: "";
            position: absolute;
            top: -1px;
            right: -1px;
            width: var(--clip);
            height: var(--clip);
            background: var(--canvas);
            border-left: 1px solid var(--hairline-strong);
            border-bottom: 1px solid var(--hairline-strong);
            pointer-events: none;
            z-index: 2;
         }

         /* ── title bar ── */
         #titlebar {
            height: 40px;
            min-height: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 6px 0 16px;
            border-bottom: 1px solid var(--hairline);
            background: rgba(0, 0, 0, 0.6);
            -webkit-app-region: drag;
         }
         .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
         }
         .brand .glyph {
            display: flex;
            color: var(--primary);
         }
         .brand .glyph svg {
            width: 14px;
            height: 14px;
         }
         .brand .b-name::before {
            content: "// ";
            color: var(--mute);
         }
         .win-controls {
            margin-left: auto;
            display: flex;
            gap: 2px;
         }
         .win-btn {
            -webkit-app-region: no-drag;
            width: 32px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: 1px solid transparent;
            color: var(--mute);
            cursor: pointer;
            transition: var(--transition);
         }
         .win-btn svg {
            width: 14px;
            height: 14px;
         }
         .win-btn.close:hover {
            background: rgba(248, 81, 73, 0.85);
            color: #fff;
         }

         /* ── body ── */
         .content {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding: 18px;
         }
         .lead {
            font-size: 12px;
            line-height: 1.6;
            color: var(--body);
         }
         .lead b {
            color: var(--ink);
            font-weight: 600;
         }
         .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
         }

         /* ── option card ── */
         .opt {
            -webkit-app-region: no-drag;
            position: relative;
            display: flex;
            align-items: center;
            gap: 16px;
            width: 100%;
            padding: 18px;
            background: var(--panel-2);
            border: 1px solid var(--hairline-strong);
            color: inherit;
            font-family: var(--sans);
            text-align: left;
            cursor: pointer;
            transition: var(--transition);
         }
         .opt .icon {
            width: 42px;
            height: 42px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--canvas);
            border: 1px solid var(--hairline-strong);
            color: var(--body);
            transition: var(--transition);
         }
         .opt .icon svg {
            width: 20px;
            height: 20px;
         }
         .opt .info {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 9px;
         }
         .opt .t {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--ink);
         }
         .opt .d {
            font-size: 11.5px;
            line-height: 1.6;
            letter-spacing: 0.2px;
            color: var(--body);
         }
         .opt .chev {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            color: var(--mute);
            transition: var(--transition);
         }
         .opt:hover {
            border-color: var(--primary);
            background: var(--panel-hover);
            box-shadow: 0 0 20px var(--primary-glow);
         }
         .opt:hover .icon {
            border-color: var(--primary);
            color: var(--ink);
         }
         .opt:hover .chev {
            color: var(--ink);
            transform: translateX(3px);
         }
         .opt:active {
            transform: translateY(1px);
         }

         /* primary (recommended) emphasis */
         .opt.primary {
            box-shadow: inset 3px 0 0 var(--primary);
         }
         .opt.primary .icon {
            background: var(--primary);
            border-color: var(--primary);
            color: var(--on-primary);
         }
         .opt.primary:hover {
            box-shadow:
               inset 3px 0 0 var(--primary),
               0 0 20px var(--primary-glow);
         }
         .pill {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 2px 7px;
            background: var(--primary);
            color: var(--on-primary);
            border: 1px solid var(--primary);
         }
      </style>
   </head>
   <body>
      <!-- ── title bar ── -->
      <header id="titlebar" onmousedown="maybeDrag(event)">
         <div class="brand">
            <span class="glyph">
               <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2 4 14h6l-1 8 9-12h-6z" /></svg>
            </span>
            <span class="b-name">Install ModsPack</span>
         </div>
         <div class="win-controls">
            <button class="win-btn close" title="Cancel" onclick="act('close')">
               <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <line x1="6" y1="6" x2="18" y2="18" />
                  <line x1="18" y1="6" x2="6" y2="18" />
               </svg>
            </button>
         </div>
      </header>

      <!-- ── body ── -->
      <main class="content">
         <div class="lead">Choose how you want to install mods.</div>

         <div class="options">
            <button class="opt primary notch" onclick="act('auto')">
               <span class="icon">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                     <path d="M12 3v12" />
                     <polyline points="7 11 12 16 17 11" />
                     <path d="M5 20h14" />
                  </svg>
               </span>
               <span class="info">
                  <span class="t">[ Auto-Install ] <span class="pill">Recommended</span></span>
                  <span class="d">Download and install the latest ModsPack automatically from the server.</span>
               </span>
               <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="9 6 15 12 9 18" />
               </svg>
            </button>

            <button class="opt notch" onclick="act('manual')">
               <span class="icon">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                     <path d="M3 7h5l2 2h11v9a2 2 0 0 1-2 2H3z" />
                  </svg>
               </span>
               <span class="info">
                  <span class="t">[ Manual-Install ]</span>
                  <span class="d">Browse and select a VPK file to install manually.</span>
               </span>
               <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="9 6 15 12 9 18" />
               </svg>
            </button>
         </div>
      </main>

      <script>
         "use strict";
         function sendMessage(data) {
            if (window.chrome && window.chrome.webview) {
               window.chrome.webview.postMessage(data);
            }
         }
         function act(type) {
            sendMessage({ type });
         }
         /* drag only when not pressing a control */
         function maybeDrag(ev) {
            if (ev.target.closest(".win-btn, .opt")) return;
            sendMessage({ type: "startDrag" });
         }
         document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") act("close");
         });
      </script>
   </body>
</html>
