<!doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <link
         href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap"
         rel="stylesheet"
      />
       <style>
         * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
         }

         :root {
            --bg: #000000;
            --surface: #141414;
            --surface-hover: #1c1c1c;
            --border: #333333;
            --border-dim: #252525;
            --text: #ffffff;
            --text-dim: #999999;
            --text-muted: #666666;
            --kofi-blue: #29abe0;
            --kofi-dark: #1d83af;
            --yt-red: #ff3232;
            --yt-dark: #c80000;
            --accent-glow: rgba(41, 171, 224, 0.15);
            --yt-glow: rgba(255, 50, 50, 0.15);

            /* ═══ SPACING TOKENS ═══ */
            --sp-xs: 6px;
            --sp-sm: 10px;
            --sp-md: 16px;
            --sp-lg: 20px;
            --sp-xl: 24px;

            /* ═══ FONT TOKENS ═══ */
            --fs-xs: 11px;
            --fs-sm: 13px;
            --fs-md: 15px;
            --fs-lg: 22px;

            /* ═══ ELEMENT TOKENS ═══ */
            --icon-card: 32px;
         }

         body {
            font-family: "JetBrains Mono", monospace;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            user-select: none;
            border: 1px solid var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
         }

         /* ═══ TITLEBAR (DRAG REGION) ═══ */
         #titlebar {
            height: 36px;
            min-height: 36px;
            -webkit-app-region: drag;
         }

         /* ═══ CLOSE X (outside drag region) ═══ */
         .close-x {
            position: fixed;
            top: 0;
            right: 0;
            z-index: 100;
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 16px;
            width: 42px;
            height: 36px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
         }
         .close-x:hover {
            color: white;
            background: rgba(255, 80, 80, 0.8);
         }

         /* ═══ MAIN LAYOUT ═══ */
         .container {
            flex: 1;
            padding: 0 40px var(--sp-xl);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
            overflow: hidden;
         }

         /* ═══ BADGE ═══ */
         .badge {
            font-size: var(--fs-sm);
            font-weight: 700;
            color: var(--text);
            background: var(--surface);
            border: 1px solid var(--border);
            padding: var(--sp-xs) 20px;
            letter-spacing: 2px;
            animation: fadeSlideIn 0.3s ease-out both;
         }

         /* ═══ HEADER ═══ */
         .title {
            font-size: var(--fs-lg);
            font-weight: 700;
            margin-top: var(--sp-md);
            letter-spacing: 2px;
            animation: fadeSlideIn 0.35s ease-out 0.05s both;
         }
         .subtitle {
            font-size: var(--fs-sm);
            color: var(--text-dim);
            margin-top: var(--sp-xs);
            text-align: center;
            line-height: 1.5;
            animation: fadeSlideIn 0.35s ease-out 0.1s both;
         }

         /* ═══ DONATION CARDS ═══ */
         .cards-row {
            display: flex;
            gap: var(--sp-md);
            margin-top: var(--sp-lg);
            width: 100%;
         }
         .card {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border-dim);
            padding: var(--sp-md) 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
         }
         .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            opacity: 0;
            transition: opacity 0.3s;
         }
         .card:hover {
            background: var(--surface-hover);
            transform: translateY(-3px);
         }
         .card:hover::before {
            opacity: 1;
         }

         .card-paypal::before {
            background: linear-gradient(90deg, transparent, #0070ba, transparent);
         }
         .card-paypal:hover {
            box-shadow: 0 8px 28px rgba(0, 112, 186, 0.15);
            border-color: rgba(0, 112, 186, 0.4);
         }

         .card-kofi::before {
            background: linear-gradient(90deg, transparent, #29abe0, transparent);
         }
         .card-kofi:hover {
            box-shadow: 0 8px 28px rgba(41, 171, 224, 0.15);
            border-color: rgba(41, 171, 224, 0.4);
         }

         .card-sociabuzz::before {
            background: linear-gradient(90deg, transparent, #00e676, transparent);
         }
         .card-sociabuzz:hover {
            box-shadow: 0 8px 28px rgba(0, 230, 118, 0.15);
            border-color: rgba(0, 230, 118, 0.4);
         }

         .card:nth-child(1) {
            animation: fadeSlideIn 0.4s ease-out 0.15s both;
         }
         .card:nth-child(2) {
            animation: fadeSlideIn 0.4s ease-out 0.22s both;
         }
         .card:nth-child(3) {
            animation: fadeSlideIn 0.4s ease-out 0.29s both;
         }

         .card-icon {
            width: var(--icon-card);
            height: var(--icon-card);
            margin: 0 auto var(--sp-sm);
            opacity: 0.9;
         }
         .card-title {
            font-size: var(--fs-md);
            font-weight: 700;
            letter-spacing: 2px;
         }
         .card-sub {
            font-size: var(--fs-xs);
            color: var(--text-muted);
            margin-top: var(--sp-xs);
         }

         /* ═══ FOOTER MESSAGE ═══ */
         .footer-msg {
            font-size: var(--fs-sm);
            color: var(--text-muted);
            margin-top: var(--sp-md);
            animation: fadeSlideIn 0.4s ease-out 0.35s both;
         }

         /* ═══ SEPARATOR ═══ */
         .separator {
            width: 100%;
            height: 1px;
            background: var(--border-dim);
            margin-top: var(--sp-md);
            animation: fadeSlideIn 0.3s ease-out 0.4s both;
         }



         /* ═══ CLOSE BUTTON ═══ */
         .close-btn {
            margin-top: var(--sp-lg);
            padding: var(--sp-xs) clamp(20px, 4vw, 36px);
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-family: "JetBrains Mono", monospace;
            font-size: var(--fs-sm);
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            animation: fadeSlideIn 0.4s ease-out 0.6s both;
         }
         .close-btn:hover {
            color: var(--text);
            background: var(--surface);
            border-color: var(--text-dim);
         }

         @keyframes fadeSlideIn {
            from {
               opacity: 0;
               transform: translateY(12px);
            }
            to {
               opacity: 1;
               transform: translateY(0);
            }
         }
      </style>
   </head>
   <body>
      <!-- Drag region -->
      <div id="titlebar"></div>

      <!-- Close X (outside drag region so clicks always work) -->
      <button class="close-x" onclick="sendMessage('close')" title="Close (ESC)">✕</button>

      <div class="container">
         <!-- Badge -->
         <div class="badge">[ SUPPORT ]</div>

         <!-- Header -->
         <div class="title">SUPPORT THE DEVELOPMENT</div>
         <div class="subtitle">
            ArdysaModsTools is free and always will be.<br />Your support helps keep this project
            alive!
         </div>

         <!-- Donation cards -->
          <div class="cards-row">
             <div class="card card-paypal" onclick="openUrl('https://paypal.me/ardysa')">
                <img
                   class="card-icon"
                   src="https://cdn.simpleicons.org/paypal/ffffff"
                   alt="PayPal"
                />
                <div class="card-title">PAYPAL</div>
                <div class="card-sub">One-time donation</div>
             </div>
             <div class="card card-kofi" onclick="openUrl('https://ko-fi.com/ardysa')">
                <img class="card-icon" src="https://cdn.simpleicons.org/kofi/ffffff" alt="Ko-fi" />
                <div class="card-title">KO-FI</div>
                <div class="card-sub">One-time / monthly</div>
             </div>
             <div class="card card-sociabuzz" onclick="openUrl('https://sociabuzz.com/ardysa/support')">
                <img
                   class="card-icon"
                   src="https://cdn.simpleicons.org/simpleicons/ffffff"
                   alt="Sociabuzz"
                />
                <div class="card-title">SOCIABUZZ</div>
                <div class="card-sub">One-time donation</div>
             </div>
          </div>

         <!-- Footer message -->
         <div class="footer-msg">❤ Every contribution helps improve the tool for everyone ❤</div>

         <!-- Separator -->
         <div class="separator"></div>



         <!-- Close button -->
         <button class="close-btn" onclick="sendMessage('close')">[ CLOSE ]</button>
      </div>

      <script>
         // C# → JS interop (with window.close() fallback)
         function sendMessage(type, data = {}) {
            if (window.chrome && window.chrome.webview) {
               window.chrome.webview.postMessage({ type, ...data });
            } else if (type === 'close') {
               window.close();
            }
         }

         function openUrl(url) {
            sendMessage("openUrl", { url });
         }

         // ESC to close
         document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") sendMessage("close");
         });

         // Drag support fallback
         document.getElementById("titlebar")?.addEventListener("mousedown", () => {
            sendMessage("startDrag");
         });
      </script>
   </body>
</html>
