<!doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Hero Selection</title>
      <script src="https://cdn.tailwindcss.com"></script>
      <script>
         tailwind.config = {
            theme: {
               extend: {
                  colors: {
                     amt: {
                        bg: "#000000",
                        "bg-secondary": "#050505",
                        card: "rgba(10, 10, 10, 0.9)",
                        "card-hover": "rgba(20, 20, 20, 0.95)",
                        border: "#333333",
                        "border-light": "#222222",
                        accent: "#00d4ff",
                        "accent-dim": "rgba(0, 212, 255, 0.15)",
                        focus: "#f59e0b",
                     },
                  },
                  fontFamily: {
                     mono: ["JetBrains Mono", "Consolas", "monospace"],
                  },
                  animation: {
                     "glow-pulse": "glow-pulse 2s ease-in-out infinite",
                     "slide-up": "slide-up 0.3s ease-out",
                     "fade-in": "fade-in 0.2s ease-out",
                     "scale-in": "scale-in 0.2s ease-out",
                     "slide-left": "slide-left 0.25s ease-out",
                     "slide-right": "slide-right 0.25s ease-out",
                     wave: "wave 20s linear infinite",
                  },
                  keyframes: {
                     "glow-pulse": {
                        "0%, 100%": { boxShadow: "0 0 5px rgba(0, 212, 255, 0.3)" },
                        "50%": { boxShadow: "0 0 20px rgba(0, 212, 255, 0.6)" },
                     },
                     "slide-up": {
                        "0%": { opacity: "0", transform: "translateY(10px)" },
                        "100%": { opacity: "1", transform: "translateY(0)" },
                     },
                     "fade-in": {
                        "0%": { opacity: "0" },
                        "100%": { opacity: "1" },
                     },
                     "scale-in": {
                        "0%": { opacity: "0", transform: "scale(0.95)" },
                        "100%": { opacity: "1", transform: "scale(1)" },
                     },
                     "slide-left": {
                        "0%": { opacity: "0", transform: "translateX(30px)" },
                        "100%": { opacity: "1", transform: "translateX(0)" },
                     },
                     "slide-right": {
                        "0%": { opacity: "0", transform: "translateX(-30px)" },
                        "100%": { opacity: "1", transform: "translateX(0)" },
                     },
                     wave: {
                        "0%": { transform: "translateX(0)" },
                        "100%": { transform: "translateX(-50%)" },
                     },
                  },
               },
            },
         };
      </script>
      <style>
         /* Custom scrollbar */
         ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
         }
         ::-webkit-scrollbar-track {
            background: #0a0a0a;
         }
         ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
         }
         ::-webkit-scrollbar-thumb:hover {
            background: #444;
         }

         /* Glass effect */
         .glass {
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
         }

         /* Card glow on selection */
         .hero-card.selected > div {
            box-shadow:
               0 0 0 2px #00d4ff,
               0 0 20px rgba(0, 212, 255, 0.3);
         }

         /* Hover lift effect */
         .hero-card {
            transition: all 0.2s ease-out;
         }
         .hero-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
         }

         /* Category filter pill active state - white theme */
         .filter-pill.active {
            background: #ffffff;
            color: black;
            font-weight: 600;
            border-color: #ffffff;
         }

         /* Search input glow on focus - white */
         .search-input:focus {
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.3);
            border-color: #ffffff;
         }

         /* Selection checkmark */
         .check-indicator {
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.15s ease-out;
         }
         .hero-card.selected .check-indicator {
            opacity: 1;
            transform: scale(1);
         }

         /* Set tile in modal */
         .set-tile {
            transition: all 0.2s ease-out;
         }
         .set-tile:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.2);
         }
         .set-tile.selected {
            box-shadow:
               0 0 0 2px #00d4ff,
               0 0 15px rgba(0, 212, 255, 0.4);
         }
         .set-tile.focused {
            box-shadow: 0 0 0 2px #f59e0b;
         }

         /* Modal backdrop */
         .modal-backdrop {
            background: rgba(0, 0, 0, 0.85);
         }

         /* Navigation arrows */
         .nav-arrow {
            transition: all 0.2s;
         }
         .nav-arrow:hover {
            background: rgba(255, 255, 255, 0.1);
         }
         .nav-arrow:active {
            transform: scale(0.95);
         }

         /* Latest Updates Carousel */
         .carousel-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(34, 197, 94, 0.08);
            padding: 12px 0;
         }
         .carousel-track {
            display: flex;
            gap: 10px;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 0 12px;
         }
         .carousel-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            cursor: pointer;
            opacity: 0;
            transition: all 0.2s ease;
            color: white;
         }
         .carousel-wrapper:hover .carousel-arrow:not(.disabled) {
            opacity: 1;
         }
         .carousel-arrow:hover {
            background: rgba(34, 197, 94, 0.4);
            border-color: rgba(34, 197, 94, 0.6);
         }
         .carousel-arrow.disabled {
            opacity: 0 !important;
            pointer-events: none;
         }
         .carousel-arrow-left {
            left: 4px;
         }
         .carousel-arrow-right {
            right: 4px;
         }

         /* Carousel Progress Indicator - Dots */
         .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-top: 10px;
            height: 8px;
         }
         .carousel-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            cursor: pointer;
            transition: all 0.2s ease;
         }
         .carousel-dot:hover {
            background: rgba(255, 255, 255, 0.35);
         }
         .carousel-dot.active {
            background: #22c55e;
            transform: scale(1.3);
         }

         .update-card {
            flex-shrink: 0;
            width: 150px;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            background: #0a0a0a;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.25s ease;
         }
         .update-card:hover {
            border-color: rgba(34, 197, 94, 0.4);
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
         }
         .update-card-image {
            position: relative;
            height: 130px;
            overflow: hidden;
         }
         .update-card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
            transition: transform 0.3s ease;
         }
         .update-card:hover .update-card-image img {
            transform: scale(1.05);
         }
         .update-card-gradient {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8) 0%, transparent 50%);
         }
         .new-badge {
            position: absolute;
            top: 6px;
            right: 6px;
            padding: 3px 6px;
            background: #22c55e;
            border-radius: 4px;
            font-size: 9px;
            font-weight: 700;
            color: black;
            text-transform: uppercase;
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.6), 0 0 16px rgba(34, 197, 94, 0.3);
            animation: badge-glow 2s ease-in-out infinite;
         }
         @keyframes badge-glow {
            0%, 100% {
               box-shadow: 0 0 8px rgba(34, 197, 94, 0.6), 0 0 16px rgba(34, 197, 94, 0.3);
            }
            50% {
               box-shadow: 0 0 12px rgba(34, 197, 94, 0.8), 0 0 24px rgba(34, 197, 94, 0.5);
            }
         }
         .update-card-content {
            padding: 10px;
         }
         .update-card-hero {
            font-size: 13px;
            font-weight: 600;
            color: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 3px;
            line-height: 1.2;
         }
         .update-card-date {
            font-size: 11px;
            color: #22c55e;
         }

         /* Container */
         #latestUpdatesContainer {
            transition: all 0.3s ease;
            max-height: 320px;
            opacity: 1;
         }
         #latestUpdatesContainer.collapsed {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
         }

         /* Highlighted set in modal */
         .set-tile.highlighted {
            animation: highlight-pulse 0.5s ease-out;
            box-shadow: 0 0 0 2px #22c55e !important;
         }
         @keyframes highlight-pulse {
            0% {
               transform: scale(1.05);
            }
            100% {
               transform: scale(1);
            }
         }

         /* Set Category Headers */
         .set-category-section {
            width: 100%;
         }
         .set-category-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 4px 10px 4px;
            user-select: none;
            font-family: 'JetBrains Mono', 'Consolas', monospace;
         }
         .set-category-header .category-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
         }
         .set-category-header .category-count {
            font-size: 10px;
            color: #666;
            margin-left: auto;
         }
         .set-category-header.legacy .category-label {
            color: #d4a057;
         }
         .set-category-header.legacy .category-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, rgba(212, 160, 87, 0.3), transparent);
         }
         .set-category-header.custom .category-label {
            color: #a78bfa;
         }
         .set-category-header.custom .category-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, rgba(167, 139, 250, 0.3), transparent);
         }
         .set-category-header.item .category-label {
            color: #22c55e;
         }
         .set-category-header.item .category-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, rgba(34, 197, 94, 0.3), transparent);
         }
         .set-category-header.basehero .category-label {
            color: #f97316;
         }
         .set-category-header.basehero .category-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, rgba(249, 115, 22, 0.3), transparent);
         }
         .set-category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 16px;
         }
         /* Toggle indicator for items and base hero */
         .set-tile .toggle-indicator {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease-out;
            background: rgba(0, 0, 0, 0.5);
         }
         .set-tile.selected .toggle-indicator {
            border-color: #00d4ff;
            background: #00d4ff;
         }
         .set-tile.selected .toggle-indicator svg {
            opacity: 1;
         }
         .set-tile .toggle-indicator svg {
            opacity: 0;
            width: 10px;
            height: 10px;
            color: black;
         }
         /* Item tile selected with green */
         .set-tile.item-tile.selected {
            box-shadow:
               0 0 0 2px #22c55e,
               0 0 15px rgba(34, 197, 94, 0.4);
         }
         /* Base hero tile selected with orange */
         .set-tile.base-tile.selected {
            box-shadow:
               0 0 0 2px #f97316,
               0 0 15px rgba(249, 115, 22, 0.4);
         }
         /* Persona tile selected with pink/magenta */
         .set-tile.persona-tile.selected {
            box-shadow:
               0 0 0 2px #ec4899,
               0 0 15px rgba(236, 72, 153, 0.4);
         }
         /* Persona category header */
         .set-category-header.persona .category-label {
            color: #ec4899;
         }
         .set-category-header.persona .category-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, rgba(236, 72, 153, 0.3), transparent);
         }
         /* Item tag badge */
         .item-tag-badge {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.25);
            margin-top: 2px;
         }
         /* Category tag badge — shown on Legacy/Custom/Persona/Base tiles in place
            of a name label. Colors match each category's header accent. */
         .set-tag-badge {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 2px;
         }
         .set-tag-badge.tag-legacy {
            background: rgba(212, 160, 87, 0.15);
            color: #d4a057;
            border: 1px solid rgba(212, 160, 87, 0.25);
         }
         .set-tag-badge.tag-custom {
            background: rgba(167, 139, 250, 0.15);
            color: #a78bfa;
            border: 1px solid rgba(167, 139, 250, 0.25);
         }
         .set-tag-badge.tag-persona {
            background: rgba(236, 72, 153, 0.15);
            color: #ec4899;
            border: 1px solid rgba(236, 72, 153, 0.25);
         }
         .set-tag-badge.tag-base {
            background: rgba(249, 115, 22, 0.15);
            color: #f97316;
            border: 1px solid rgba(249, 115, 22, 0.25);
         }
         /* Persona exclusion warning */
         .exclusion-notice {
            font-size: 10px;
            color: #f59e0b;
            opacity: 0.8;
            padding: 4px 0;
         }

          /* Style count badge — shown on tiles that have multiple style variants */
          .style-count-badge {
             position: absolute;
             bottom: 6px;
             right: 6px;
             padding: 2px 6px;
             border-radius: 4px;
             font-size: 9px;
             font-weight: 700;
             color: white;
             background: rgba(0, 0, 0, 0.7);
             backdrop-filter: blur(4px);
             -webkit-backdrop-filter: blur(4px);
             border: 1px solid rgba(255, 255, 255, 0.15);
             letter-spacing: 0.03em;
             pointer-events: none;
          }

          /* Style Preview Modal — opens over the hero modal to show variant tiles */
          .style-preview-backdrop {
             background: rgba(0, 0, 0, 0.88);
             backdrop-filter: blur(8px);
             -webkit-backdrop-filter: blur(8px);
          }
          .style-preview-panel {
             background: #0a0a0a;
             border: 1px solid rgba(255, 255, 255, 0.1);
             border-radius: 16px;
             max-width: 540px;
             width: 100%;
             max-height: 80vh;
             overflow: hidden;
             animation: style-preview-enter 0.25s cubic-bezier(0.16, 1, 0.3, 1);
          }
          @keyframes style-preview-enter {
             0% { opacity: 0; transform: scale(0.92) translateY(12px); }
             100% { opacity: 1; transform: scale(1) translateY(0); }
          }
          .style-preview-header {
             display: flex;
             align-items: center;
             gap: 12px;
             padding: 16px 20px;
             border-bottom: 1px solid rgba(255, 255, 255, 0.08);
          }
          .style-preview-header-thumb {
             width: 40px;
             height: 40px;
             border-radius: 8px;
             overflow: hidden;
             border: 1px solid rgba(255, 255, 255, 0.1);
             flex-shrink: 0;
          }
          .style-preview-header-thumb img {
             width: 100%;
             height: 100%;
             object-fit: cover;
          }
          .style-preview-header-info {
             flex: 1;
             min-width: 0;
          }
          .style-preview-header-title {
             font-size: 15px;
             font-weight: 600;
             white-space: nowrap;
             overflow: hidden;
             text-overflow: ellipsis;
          }
          .style-preview-header-sub {
             font-size: 11px;
             opacity: 0.5;
             margin-top: 2px;
          }
          .style-preview-close {
             width: 28px;
             height: 28px;
             display: flex;
             align-items: center;
             justify-content: center;
             border-radius: 6px;
             background: transparent;
             border: none;
             color: rgba(255, 255, 255, 0.4);
             cursor: pointer;
             transition: all 0.15s ease;
             flex-shrink: 0;
          }
          .style-preview-close:hover {
             background: rgba(255, 255, 255, 0.08);
             color: white;
          }
          .style-preview-grid {
             display: grid;
             grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
             gap: 12px;
             padding: 16px 20px;
             max-height: 58vh;
             overflow-y: auto;
          }
          .style-preview-tile {
             position: relative;
             border-radius: 10px;
             overflow: hidden;
             border: 2px solid rgba(255, 255, 255, 0.06);
             cursor: pointer;
             transition: all 0.2s ease-out;
             background: #111;
          }
          .style-preview-tile:hover {
             border-color: rgba(255, 255, 255, 0.2);
             transform: scale(1.03);
             box-shadow: 0 6px 24px rgba(0, 0, 0, 0.5);
          }
          .style-preview-tile.active {
             border-color: var(--sc-accent, #00d4ff);
             box-shadow:
                0 0 0 1px var(--sc-accent, #00d4ff),
                0 0 20px color-mix(in srgb, var(--sc-accent, #00d4ff) 30%, transparent);
          }
          .style-preview-tile-img {
             aspect-ratio: 1;
             overflow: hidden;
          }
          .style-preview-tile-img img {
             width: 100%;
             height: 100%;
             object-fit: cover;
             transition: transform 0.3s ease;
          }
          .style-preview-tile:hover .style-preview-tile-img img {
             transform: scale(1.08);
          }
          .style-preview-tile-label {
             padding: 8px 10px;
             font-size: 11px;
             font-weight: 500;
             white-space: nowrap;
             overflow: hidden;
             text-overflow: ellipsis;
             color: rgba(255, 255, 255, 0.75);
          }
          .style-preview-tile.active .style-preview-tile-label {
             color: #fff;
          }
          .style-preview-tile-check {
             position: absolute;
             top: 6px;
             right: 6px;
             width: 20px;
             height: 20px;
             border-radius: 50%;
             background: var(--sc-accent, #00d4ff);
             display: flex;
             align-items: center;
             justify-content: center;
             opacity: 0;
             transform: scale(0.5);
             transition: all 0.15s ease-out;
          }
          .style-preview-tile.active .style-preview-tile-check {
             opacity: 1;
             transform: scale(1);
          }
          .style-preview-tile-check svg {
             width: 12px;
             height: 12px;
             color: #000;
          }
          .style-preview-footer {
             display: flex;
             align-items: center;
             justify-content: flex-end;
             gap: 8px;
             padding: 12px 20px;
             border-top: 1px solid rgba(255, 255, 255, 0.08);
          }

         /* Has Sets toggle pill */
         .toggle-pill {
            transition: all 0.2s ease;
            user-select: none;
         }
         .toggle-pill.active {
            background: rgba(0, 212, 255, 0.12);
            color: #00d4ff;
            border-color: rgba(0, 212, 255, 0.4);
            font-weight: 600;
         }
         .toggle-pill .toggle-dot {
            display: inline-block;
            transition: all 0.2s ease;
         }
      </style>
   </head>

   <body class="bg-amt-bg text-white font-mono min-h-screen">
      <!-- Custom Title Bar (for borderless window) -->
      <div
         id="titleBar"
         class="fixed top-0 left-0 right-0 z-50 h-10 bg-amt-bg border-b border-amt-border flex items-center justify-between px-4 select-none cursor-move"
         onmousedown="startDrag(event)"
      >
         <div class="flex items-center gap-3">
            <span class="text-sm font-semibold text-gray-300">Skin Selector</span>
            <span class="text-xs text-gray-600">Beta</span>
         </div>
         <button
            onclick="requestClose()"
            class="w-8 h-8 flex items-center justify-center rounded hover:bg-red-500/20 text-gray-400 hover:text-red-400 transition-all"
            onmousedown="event.stopPropagation()"
         >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
               <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M6 18L18 6M6 6l12 12"
               />
            </svg>
         </button>
      </div>

      <!-- Header with search and filters -->
      <header class="sticky top-10 z-40 glass bg-amt-bg/90 border-b border-amt-border px-6 py-4">
         <div class="flex flex-col gap-4">
            <!-- Top row: Search and action buttons -->
            <div class="flex items-center gap-4">
               <!-- Search -->
               <div class="relative flex-1 max-w-md">
                  <svg
                     class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500"
                     fill="none"
                     stroke="currentColor"
                     viewBox="0 0 24 24"
                  >
                     <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
                     />
                  </svg>
                  <input
                     type="text"
                     id="searchInput"
                     placeholder="Search heroes..."
                     class="search-input w-full bg-amt-bg-secondary border border-amt-border rounded-lg pl-10 pr-4 py-2.5 text-sm focus:outline-none focus:border-amt-accent transition-all"
                  />
               </div>

               <!-- Selection counter -->
               <div class="flex items-center gap-2 text-sm text-gray-400">

      <script>
         // ============================================
         // Data & State
         // ============================================
         let heroes = [];
         let filteredHeroes = []; // Currently visible heroes after filtering
         // Structured selections: { heroId: { set: idx|null, items: [idx...], base: idx|null } }
         let selections = {};
         let favorites = new Set();
         let currentFilter = "all";
         let searchQuery = "";
         let showOnlyWithSets = false;
         let currentModalHeroId = null;
         let focusedSetIndex = 0;

         // ============================================
         // Selection Helpers
         // ============================================
         function getHeroSelection(heroId) {
            if (!selections[heroId]) {
               selections[heroId] = { set: null, items: [], base: null };
            }
            return selections[heroId];
         }

         function hasAnySelection(heroId) {
            const s = selections[heroId];
            if (!s) return false;
            return s.set !== null || (s.items && s.items.length > 0) || s.base !== null;
         }

         // Check if the currently selected set is a Persona category
         function isPersonaActive(heroId) {
            const s = selections[heroId];
            if (!s || s.set === null) return false;
            const hero = heroes.find(h => h.id === heroId);
            if (!hero || !hero.sets || !hero.sets[s.set]) return false;
            return getSetCategory(hero.sets[s.set]) === 'persona';
         }

         function getSelectionSummary(hero) {
            const s = selections[hero.id];
            if (!s) return null;
            const parts = [];
            if (s.set !== null && hero.sets && hero.sets[s.set]) {
               const setObj = hero.sets[s.set];
               const isPersona = getSetCategory(setObj) === 'persona';
               const setName = setObj.styleGroup
                  ? `${setObj.styleGroup} · ${setObj.styleLabel}`
                  : setObj.name;
               parts.push(isPersona ? `Persona: ${setName}` : setName);
            }
            if (s.items && s.items.length > 0) {
               parts.push(`${s.items.length} item${s.items.length > 1 ? 's' : ''}`);
            }
            if (s.base !== null) {
               parts.push('Base');
            }
            return parts.length > 0 ? parts.join(' + ') : null;
         }

         function getSetCategory(set) {
            return (set && set.category) || 'legacyset';
         }

         // Extract the slot tag from an item set's archive URL filename.
         // Format: item_{tag}_{name}[_{N}].zip → returns the tag segment.
         // Falls back to the 'tag' field sent from C# if available.
         function extractItemTag(set) {
            // Use pre-computed tag from C# if available
            if (set && set.tag) return set.tag;
            return null;
         }

         // Category tag shown on non-item tiles in place of a name label.
         // Legacy → "Set", Custom → "Mix", Persona → "Persona", Base → "Arcana".
         // Returns { label, cssClass } or null for items (they use their slot tag).
         function getCategoryTag(set) {
            switch (getSetCategory(set)) {
               case 'customset': return { label: 'Mix', cssClass: 'tag-custom' };
               case 'persona':   return { label: 'Persona', cssClass: 'tag-persona' };
               case 'basehero':  return { label: 'Arcana', cssClass: 'tag-base' };
               case 'item':      return null;
               default:          return { label: 'Set', cssClass: 'tag-legacy' };
            }
         }

         // Find all item indices that share the same tag as the given index.
         function getItemsWithSameTag(hero, targetIdx) {
            if (!hero || !hero.sets) return [];
            const targetSet = hero.sets[targetIdx];
            if (!targetSet) return [];
            const targetTag = extractItemTag(targetSet);
            if (!targetTag) return [];

            const sameTag = [];
            hero.sets.forEach((set, idx) => {
               if (idx !== targetIdx && getSetCategory(set) === 'item') {
                  const tag = extractItemTag(set);
                  if (tag && tag === targetTag) sameTag.push(idx);
               }
            });
            return sameTag;
         }

         // ============================================
         // C# Interop Functions
         // ============================================
         
         // Caching Overlay Control
         function showCachingOverlay() {
            const overlay = document.getElementById("cachingOverlay");
            if (overlay) {
               overlay.classList.remove("hidden");
               overlay.style.opacity = "1";
               document.getElementById("cachingStatus").textContent = "Downloading thumbnails...";
               document.getElementById("cachingBar").style.width = "0%";
               document.getElementById("cachingCount").textContent = "0 / 0";
               document.getElementById("cachingPercent").textContent = "0%";
            }
         }

         function updateCachingProgress(current, total) {
            const pct = total > 0 ? Math.round((current / total) * 100) : 100;
            document.getElementById("cachingBar").style.width = `${pct}%`;
            document.getElementById("cachingCount").textContent = `${current} / ${total}`;
            document.getElementById("cachingPercent").textContent = `${pct}%`;
            
            if (current >= total && total > 0) {
               document.getElementById("cachingStatus").textContent = "Complete!";
            }
         }

         function hideCachingOverlay() {
            const overlay = document.getElementById("cachingOverlay");
            if (overlay) {
               overlay.style.opacity = "0";
               overlay.style.transition = "opacity 0.2s ease";
               setTimeout(() => overlay.classList.add("hidden"), 200);
            }
         }

         function loadHeroes(heroesJson) {
            heroes = typeof heroesJson === "string" ? JSON.parse(heroesJson) : heroesJson;
            renderHeroes();
            updateStatus(`Loaded ${heroes.length} heroes`);
         }

         function loadSelections(selectionsJson) {
            selections =
               typeof selectionsJson === "string" ? JSON.parse(selectionsJson) : selectionsJson;
            updateSelectionCount();
            renderHeroes();
         }

         // Called from C# to restore highlighted heroes (simplified persistence)
         function loadHighlightedHeroes(heroIdsJson) {
            const heroIds = typeof heroIdsJson === "string" ? JSON.parse(heroIdsJson) : heroIdsJson;
            if (!Array.isArray(heroIds)) return;
            // Mark heroes as highlighted with empty selection state
            heroIds.forEach(id => {
               if (!selections[id]) {
                  selections[id] = { set: null, items: [], base: null };
               }
            });
            updateSelectionCount();
            renderHeroes();
         }

         function loadFavorites(favoritesArray) {
            favorites = new Set(
               typeof favoritesArray === "string" ? JSON.parse(favoritesArray) : favoritesArray,
            );
            renderHeroes();
         }

         // ============================================
         // Latest Updates Carousel
         // ============================================
         let latestUpdates = [];
         let updatesCollapsed = false;
         let highlightSetIndex = -1;
         let carouselIndex = 0;
         const MAX_CAROUSEL_ITEMS = 30; // Maximum items to show for better UX

         function loadLatestUpdates(updatesJson) {
            let parsed = typeof updatesJson === "string" ? JSON.parse(updatesJson) : updatesJson;

            if (!parsed || parsed.length === 0) {
               document.getElementById("latestUpdatesSection").classList.add("hidden");
               return;
            }

            // Limit to max items for better UX
            latestUpdates = parsed.slice(0, MAX_CAROUSEL_ITEMS);

            // Show section
            document.getElementById("latestUpdatesSection").classList.remove("hidden");
            document.getElementById("updatesCount").textContent = `${latestUpdates.length} new`;

            // Render cards
            const grid = document.getElementById("latestUpdatesGrid");
            grid.innerHTML = latestUpdates
               .map((update, idx) => {
                  const daysText =
                     update.daysAgo === 0
                        ? "Today"
                        : update.daysAgo === 1
                          ? "Yesterday"
                          : `${update.daysAgo}d ago`;
                  return `
                  <div class="update-card" onclick="navigateToUpdate('${update.heroId}', ${update.setIndex})">
                     <div class="update-card-image">
                        <img src="${update.setThumbnail || ""}"
                             alt="${update.heroName}"
                              onerror="this.onerror=null;this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23111%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%23333%22 font-size=%2210%22>?</text></svg>'" />
                         <div class="update-card-gradient"></div>
                         ${update.daysAgo <= 2 ? '<span class="new-badge">NEW</span>' : ''}
                      </div>
                      <div class="update-card-content">
                         <p class="update-card-hero">${update.heroName}</p>
                         <p class="update-card-date">${daysText}</p>
                      </div>
                   </div>
                `;
               })
               .join("");

            // Init carousel
            carouselIndex = 0;
            updateCarouselPosition();
            updateCarouselArrows();

            window.addEventListener("resize", handleCarouselResize);
            
            // Add mouse wheel scrolling for carousel
            const carouselWrapper = document.querySelector('.carousel-wrapper');
            if (carouselWrapper) {
               carouselWrapper.addEventListener('wheel', handleCarouselWheel, { passive: false });
            }
         }

         function handleCarouselWheel(e) {
            const metrics = getCarouselMetrics();
            if (!metrics || metrics.maxScrollIndex <= 0) return;
            
            // Prevent page scroll when on carousel
            e.preventDefault();
            
            // Scroll direction: positive deltaY = scroll down = next, negative = prev
            if (e.deltaY > 0) {
               // Scroll right (next)
               if (carouselIndex < metrics.maxScrollIndex) {
                  carouselIndex = Math.min(carouselIndex + 1, metrics.maxScrollIndex);
                  updateCarouselPosition();
                  updateCarouselArrows();
               }
            } else if (e.deltaY < 0) {
               // Scroll left (prev)
               if (carouselIndex > 0) {
                  carouselIndex = Math.max(carouselIndex - 1, 0);
                  updateCarouselPosition();
                  updateCarouselArrows();
               }
            }
         }

         function handleCarouselResize() {
            // Clamp carouselIndex to valid range after resize
            const metrics = getCarouselMetrics();
            if (metrics) {
               carouselIndex = Math.min(carouselIndex, metrics.maxScrollIndex);
            }
            updateCarouselPosition();
            updateCarouselArrows();
         }

         function getCarouselMetrics() {
            const wrapper = document.querySelector(".carousel-wrapper");
            const grid = document.getElementById("latestUpdatesGrid");
            if (!wrapper || !grid) return null;

            const cardWidth = 150; // card width
            const gap = 10; // gap between cards
            const padding = 24; // 12px padding on each side
            const wrapperWidth = wrapper.clientWidth - padding;
            const totalCards = latestUpdates.length;
            const totalContentWidth = totalCards * cardWidth + (totalCards - 1) * gap;
            const visibleCards = Math.floor((wrapperWidth + gap) / (cardWidth + gap));
            const maxScrollIndex = Math.max(0, totalCards - visibleCards);

            return {
               cardWidth,
               gap,
               padding,
               wrapperWidth,
               totalCards,
               totalContentWidth,
               visibleCards,
               maxScrollIndex,
            };
         }

         function renderCarouselDots() {
            const metrics = getCarouselMetrics();
            const dotsContainer = document.getElementById("carouselDots");
            if (!metrics || !dotsContainer) return;

            const { totalCards, visibleCards, maxScrollIndex } = metrics;

            // Hide dots if all items fit or only one page
            if (totalCards <= visibleCards || maxScrollIndex <= 0) {
               dotsContainer.innerHTML = "";
               return;
            }

            // Create dots for each scroll position (page-based for cleaner UX)
            const totalDots = Math.min(maxScrollIndex + 1, 5); // Max 5 dots
            const dotStep = maxScrollIndex / (totalDots - 1);
            
            dotsContainer.innerHTML = Array.from({ length: totalDots }, (_, i) => {
               const dotIndex = Math.round(i * dotStep);
               const isActive = carouselIndex >= dotIndex - dotStep/2 && carouselIndex < dotIndex + dotStep/2 + 1;
               return `<button class="carousel-dot ${i === 0 && carouselIndex === 0 ? 'active' : ''} ${isActive ? 'active' : ''}" onclick="goToCarouselIndex(${dotIndex})"></button>`;
            }).join("");
            
            // Update active dot
            const dots = dotsContainer.querySelectorAll('.carousel-dot');
            dots.forEach((dot, i) => {
               const dotIndex = Math.round(i * dotStep);
               const isActive = (i === 0 && carouselIndex <= dotStep/2) || 
                               (i === totalDots - 1 && carouselIndex >= maxScrollIndex - dotStep/2) ||
                               (carouselIndex >= dotIndex - dotStep/2 && carouselIndex < dotIndex + dotStep/2);
               dot.classList.toggle('active', isActive);
            });
         }

         function goToCarouselIndex(index) {
            const metrics = getCarouselMetrics();
            if (!metrics) return;
            carouselIndex = Math.max(0, Math.min(index, metrics.maxScrollIndex));
            updateCarouselPosition();
            updateCarouselArrows();
         }

         function updateCarouselPosition() {
            const grid = document.getElementById("latestUpdatesGrid");
            const metrics = getCarouselMetrics();
            if (!grid || !metrics) return;

            const { cardWidth, gap, maxScrollIndex } = metrics;

            // Clamp carousel index to valid range
            carouselIndex = Math.max(0, Math.min(carouselIndex, maxScrollIndex));

            // Calculate offset
            const offset = carouselIndex * (cardWidth + gap);
            grid.style.transform = `translateX(-${offset}px)`;

            renderCarouselDots();
         }

         function updateCarouselArrows() {
            const prevBtn = document.getElementById("carouselPrevBtn");
            const nextBtn = document.getElementById("carouselNextBtn");
            const metrics = getCarouselMetrics();

            if (!metrics) return;
            const { maxScrollIndex } = metrics;

            if (prevBtn) prevBtn.classList.toggle("disabled", carouselIndex <= 0);
            if (nextBtn) nextBtn.classList.toggle("disabled", carouselIndex >= maxScrollIndex);
         }

         function carouselPrev() {
            const metrics = getCarouselMetrics();
            if (!metrics) return;

            // Scroll by a few items at a time for better UX
            const scrollAmount = Math.max(1, Math.floor(metrics.visibleCards / 2));
            carouselIndex = Math.max(0, carouselIndex - scrollAmount);
            updateCarouselPosition();
            updateCarouselArrows();
         }

         function carouselNext() {
            const metrics = getCarouselMetrics();
            if (!metrics) return;

            const { maxScrollIndex, visibleCards } = metrics;
            const scrollAmount = Math.max(1, Math.floor(visibleCards / 2));
            carouselIndex = Math.min(maxScrollIndex, carouselIndex + scrollAmount);
            updateCarouselPosition();
            updateCarouselArrows();
         }

         function goToCarouselPage(page) {
            // Legacy function - kept for compatibility
            carouselIndex = page;
            updateCarouselPosition();
            updateCarouselArrows();
         }

         function navigateToUpdate(heroId, setIndex) {
            // Store which set to highlight
            highlightSetIndex = setIndex;

            // Find hero card
            const heroCard = document.querySelector(`[data-hero-id="${heroId}"]`);
            if (heroCard) {
               // Scroll to hero if not visible
               heroCard.scrollIntoView({ behavior: "smooth", block: "center" });

               // Open the modal after scroll
               setTimeout(() => {
                  openHeroModal(heroId);

                  // Highlight and focus the specific set
                  if (setIndex >= 0) {
                     setTimeout(() => {
                        focusedSetIndex = setIndex;
                        updateFocusState();

                        // Add highlight effect to the set tile
                        const setTiles = document.querySelectorAll(".set-tile");
                        if (setTiles[setIndex]) {
                           setTiles[setIndex].classList.add("highlighted");
                           setTiles[setIndex].scrollIntoView({
                              behavior: "smooth",
                              block: "nearest",
                           });

                           // Remove highlight after animation
                           setTimeout(() => {
                              setTiles[setIndex].classList.remove("highlighted");
                           }, 2000);
                        }

                        // Reset highlight tracker
                        highlightSetIndex = -1;
                     }, 150);
                  }
               }, 350);
            }
         }

         function toggleUpdatesSection() {
            const container = document.getElementById("latestUpdatesContainer");
            const toggleText = document.getElementById("toggleUpdatesText");
            const toggleIcon = document.getElementById("toggleUpdatesIcon");

            updatesCollapsed = !updatesCollapsed;

            if (updatesCollapsed) {
               container.classList.add("collapsed");

               container.classList.remove("collapsed");

         function requestGenerate() {
            // Filter to only heroes with actual selections
            const activeSelections = {};
            for (const [id, sel] of Object.entries(selections)) {
               if (hasAnySelection(id)) activeSelections[id] = sel;
            }
            if (Object.keys(activeSelections).length === 0) {
               updateStatus("Please select at least one hero");
               return;
            }
            if (window.chrome && window.chrome.webview) {
               window.chrome.webview.postMessage({ type: "generate", selections: activeSelections });
            }
         }

         function closeAlert() {
            document.getElementById("alertModal").classList.add("hidden");
            // Notify C# that alert was dismissed
            if (window.chrome && window.chrome.webview) {
               window.chrome.webview.postMessage({ type: "alertDismissed" });
            }
         }

         function updateStatus(text) {
            document.getElementById("statusText").textContent = text;

            document.getElementById("versionText").textContent = `version ${version}`;

         // ============================================
         // Attribute Helpers
         // ============================================
         function matchesCategory(heroAttr, category) {
            if (category === "all") return true;
            if (category === "favorites") return false;
            const a = (heroAttr || "").toLowerCase();
            if (category === "str") return a === "str" || a === "strength";
            if (category === "agi") return a === "agi" || a === "agility";
            if (category === "int") return a === "int" || a === "intelligence";
            if (category === "universal") return a === "universal" || a === "all" || a === "";
            return true;
         }

         // Check if a hero has at least one set that is NOT "Default Set"
         function heroHasCustomSets(hero) {
            if (!hero.sets || hero.sets.length === 0) return false;
            return hero.sets.some(s => {
               const name = (s.name || "").toLowerCase();
               return name !== "default set" && name !== "default";
            });
         }

         // ============================================
         // Rendering
         // ============================================
         function renderHeroes() {
            const grid = document.getElementById("heroGrid");
            const emptyState = document.getElementById("emptyState");

            filteredHeroes = heroes.filter((hero) => {
               if (currentFilter === "favorites") {
                  if (!favorites.has(hero.id)) return false;
               } else if (currentFilter !== "all") {
                  if (!matchesCategory(hero.attribute, currentFilter)) return false;
               }

               if (searchQuery) {
                  const q = searchQuery.toLowerCase();
                  if (
                     !hero.name?.toLowerCase().includes(q) &&
                     !hero.displayName?.toLowerCase().includes(q)
                  ) {
                     return false;
                  }
               }

               // Has Sets toggle filter
               if (showOnlyWithSets && !heroHasCustomSets(hero)) {
                  return false;
               }

               return true;
            });

            if (filteredHeroes.length === 0) {
               grid.classList.add("hidden");
               emptyState.classList.remove("hidden");
               emptyState.classList.add("flex");
               return;
            } else {
               grid.classList.remove("hidden");
               emptyState.classList.add("hidden");
               emptyState.classList.remove("flex");
            }

            grid.innerHTML = filteredHeroes
               .map((hero, index) => {
                  const isSelected = hasAnySelection(hero.id);
                  const isFavorite = favorites.has(hero.id);
                  const summary = getSelectionSummary(hero);
                  const hasSets = hero.sets && hero.sets.length > 0;

                  // Determine display thumbnail: use selected set's thumb if available
                  let displayThumb = hero.thumbnail;
                  const sel = selections[hero.id];
                  if (isSelected && sel && sel.set !== null && hero.sets && hero.sets[sel.set]) {
                     const setThumb = hero.sets[sel.set].thumbnailUrl;
                     if (setThumb) displayThumb = setThumb;
                  }

                  return `
               <div class="hero-card animate-fade-in ${isSelected ? "selected" : ""}" 
                  data-hero-id="${hero.id}"
                  style="animation-delay: ${Math.min(index * 15, 200)}ms">
                  
                  <div class="relative bg-amt-card rounded-xl overflow-hidden border border-amt-border hover:border-amt-accent/50 transition-all cursor-pointer group"
                       onclick="openHeroModal('${hero.id}')">
                     
                     <div class="relative aspect-square overflow-hidden">
                        <img src="${displayThumb || ""}" 
                             alt="${hero.displayName || hero.name}"
                             class="w-full h-full object-cover object-top transition-transform duration-300 group-hover:scale-110"
                             onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23111%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%23333%22 font-size=%2212%22>?</text></svg>'" />
                        
                        <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent"></div>
                        
                        <div class="check-indicator absolute top-1.5 right-1.5 w-5 h-5 bg-amt-accent rounded-full flex items-center justify-center">
                           <svg class="w-3 h-3 text-black" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
                              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                           </svg>
                        </div>

                        <button class="absolute top-1.5 left-1.5 w-6 h-6 flex items-center justify-center rounded-full bg-black/50 hover:bg-black/70 transition-all opacity-0 group-hover:opacity-100"
                                onclick="event.stopPropagation(); toggleFavorite('${hero.id}')">
                           <span class="text-xs ${
                              isFavorite ? "text-yellow-400" : "text-gray-400"
                           }">${isFavorite ? "★" : "☆"}</span>
                        </button>

                        <div class="absolute bottom-0 left-0 right-0 p-2">
                           <h3 class="text-xs font-medium truncate leading-tight">${
                              hero.displayName || hero.name
                           }</h3>
                           ${
                              summary
                                 ? `<p class="text-[10px] text-amt-accent truncate">${summary}</p>`
                                 : hasSets
                                   ? `<p class="text-[10px] text-gray-500">${hero.sets.length} set${
                                        hero.sets.length > 1 ? "s" : ""
                                     }</p>`
                                   : ""
                           }

               })
