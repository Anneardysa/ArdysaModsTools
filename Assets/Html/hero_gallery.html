         // ============================================
         // Modal Functions
         // ============================================
         function openHeroModal(heroId) {
            const hero = heroes.find((h) => h.id === heroId);
            if (!hero || !hero.sets || hero.sets.length === 0) {
               updateStatus(`${hero?.displayName || heroId} has no sets available`);
               return;
            }

            currentModalHeroId = heroId;
            focusedSetIndex = 0;

            const modal = document.getElementById("setModal");
            document.getElementById("modalHeroImg").src = hero.thumbnail;
            document.getElementById("modalHeroName").textContent = hero.displayName || hero.name;

            renderModalSets();
            modal.classList.remove("hidden");
         }

         function isCustomSet(set) {
            return set && set.isCustom === true;
         }

         // Render a set/item/base/persona tile with appropriate styling
         function renderSetTile(set, idx, hero, heroSel, tileType) {
            // Styled tiles: this single tile represents a whole styleGroup. Selection and
            // display collapse across all variants in the group, and clicking the tile opens
            // the Style Preview modal instead of selecting directly. A group with a single
            // variant (or no styleGroup) behaves like a normal tile that selects on click.
            const styleGroup = set.styleGroup || null;
            const groupEntries = styleGroup
               ? hero.sets.map((s, i) => ({ set: s, idx: i })).filter(e => e.set.styleGroup === styleGroup)
               : [];
            const hasStyles = styleGroup && groupEntries.length > 1;
            const activeStyleIdx = hasStyles ? getActiveStyleIndex(groupEntries, heroSel, tileType) : null;

            let isSelected = false;
            if (hasStyles) {
               isSelected = activeStyleIdx !== null;
            } else if (tileType === 'set' || tileType === 'persona') {
               isSelected = heroSel.set === idx;
            } else if (tileType === 'item') {
               isSelected = heroSel.items && heroSel.items.includes(idx);
            } else if (tileType === 'base') {
               isSelected = heroSel.base === idx;
            }
            const isFocused = focusedSetIndex === idx;

            // For a styled tile, show the active variant's thumbnail when one is selected.
            const activeSet = hasStyles && activeStyleIdx !== null ? hero.sets[activeStyleIdx] : null;
            const thumbUrl = (activeSet && activeSet.thumbnailUrl) || set.thumbnailUrl || hero.thumbnail;
            const tileClass = tileType === 'item' ? 'item-tile' : tileType === 'base' ? 'base-tile' : tileType === 'persona' ? 'persona-tile' : '';

            // Click handler depends on type
            // Persona uses selectSet — it shares the set slot
            // Styled tiles open the Style Preview modal for the group; everything else selects directly.
            let clickFn;
            if (hasStyles) {
               // Escape the group name for an inline (double-quoted) onclick attribute.
               const groupArg = `'${String(styleGroup).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;')}'`;
               clickFn = `openStylePreviewForTile('${currentModalHeroId}', ${groupArg}, '${tileType}')`;
            } else if (tileType === 'set' || tileType === 'persona') {
               clickFn = `selectSet('${currentModalHeroId}', ${idx})`;
            } else if (tileType === 'item') {
               clickFn = `toggleItem('${currentModalHeroId}', ${idx})`;
            } else {
               clickFn = `toggleBase('${currentModalHeroId}', ${idx})`;
            }

            // Status label
            let statusHtml = '';
            if (isSelected) {
               const statusColor = tileType === 'item' ? 'text-green-400' : tileType === 'base' ? 'text-orange-400' : tileType === 'persona' ? 'text-pink-400' : 'text-amt-accent';
               const activeLabel = activeSet && (activeSet.styleLabel || activeSet.name);
               const statusText = hasStyles && activeLabel ? `\u2713 ${activeLabel}` : '\u2713 Selected';
               statusHtml = `<p class="text-xs ${statusColor} mt-1">${statusText}</p>`;
            }

            // Tag badge — items show their slot tag (head/weapon/…); Legacy/Custom/
            // Persona/Base tiles show a category tag (Set/Mix/Persona/Arcana) in
            // place of a name label.
            let tagHtml = '';
            if (tileType === 'item') {
               const tag = extractItemTag(set);
               if (tag) {
                  tagHtml = `<span class="item-tag-badge">${tag}</span>`;
               }
            } else {
               const catTag = getCategoryTag(set);
               if (catTag) {
                  tagHtml = `<span class="set-tag-badge ${catTag.cssClass}">${catTag.label}</span>`;
               }
            }

            // Toggle indicator for items, base, and persona
            const showToggle = tileType === 'item' || tileType === 'base' || tileType === 'persona';
            const toggleHtml = showToggle ? `
               <div class="toggle-indicator">
                  <svg fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
                     <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                  </svg>
               </div>` : '';

            // Variant-count badge on styled tiles
            const styleCountBadge = hasStyles ? `<span class="style-count-badge">${groupEntries.length} styles</span>` : '';

            // Display name is kept only for the image alt text — no grid tile (plain or
            // Style Card) renders a visible name label anymore; each shows just its tag
            // badge. The set/variant name still appears inside the Style Preview Modal.
            const displayName = styleGroup || set.name || `Set ${idx + 1}`;

            return `
            <div class="set-tile ${tileClass} ${isSelected ? 'selected' : ''} ${
               isFocused ? 'focused' : ''
            } bg-amt-card rounded-xl overflow-hidden border border-amt-border cursor-pointer relative"
                 data-set-index="${idx}"
                 onclick="${clickFn}">
               <div class="aspect-square overflow-hidden relative">
                  <img src="${thumbUrl}" alt="${displayName}" 
                       class="w-full h-full object-cover"
                       onerror="this.src='${hero.thumbnail}'" />
                  ${toggleHtml}
                  ${styleCountBadge}
               </div>
               <div class="p-3">
                  ${tagHtml}
                  ${statusHtml}
               </div>
            </div>
            `;
         }

         // Returns the original set index of the currently-active style within a group,
         // or null when none of the group's styles is selected. Honors the selection slot
         // for the tile type (set/persona → sel.set, item → sel.items, base → sel.base).
         function getActiveStyleIndex(entries, heroSel, tileType) {
            for (const { idx } of entries) {
               if (tileType === 'item') {
                  if (heroSel.items && heroSel.items.includes(idx)) return idx;
               } else if (tileType === 'base') {
                  if (heroSel.base === idx) return idx;
               } else {
                  if (heroSel.set === idx) return idx;
               }
            }
            return null;
         }

         // ============================================
         // Style Preview Modal
         // ============================================
         let stylePreviewState = null; // { heroId, tileType, groupIndices, entries }

         // Selects a style within a group, enforcing one-active-style-per-group, then delegates
         // to the existing selection handlers so all downstream rules/notifications are reused.
         function selectStyle(heroId, tileType, idx, groupIndices) {
            if (tileType === 'item') {
               // Multi-select slot: drop any sibling style of this group before toggling.
               if (isPersonaActive(heroId)) return;
               const sel = getHeroSelection(heroId);
               if (!sel.items.includes(idx)) {
                  groupIndices.forEach(gi => {
                     if (gi !== idx) {
                        const ci = sel.items.indexOf(gi);
                        if (ci >= 0) sel.items.splice(ci, 1);
                     }
                  });
               }
               toggleItem(heroId, idx);
            } else if (tileType === 'base') {
               toggleBase(heroId, idx);
            } else {
               selectSet(heroId, idx);
            }
         }

         // Opens the Style Preview Modal for a tile that belongs to a styleGroup.
         // Called directly from tile onclick — gathers group entries from hero data.
         function openStylePreviewForTile(heroId, groupName, tileType) {
            const hero = heroes.find(h => h.id === heroId);
            if (!hero) return;

            // Gather all entries in this styleGroup
            const entries = [];
            hero.sets.forEach((s, i) => {
               if (s.styleGroup === groupName) {
                  entries.push({ idx: i, name: s.name, styleLabel: s.styleLabel, thumbnailUrl: s.thumbnailUrl });
               }
            });
            if (entries.length === 0) return;

            const groupIndices = entries.map(e => e.idx);
            const heroSel = getHeroSelection(heroId);
            const activeIdx = getActiveStyleIndex(
               entries.map(e => ({ idx: e.idx, set: hero.sets[e.idx] })),
               heroSel, tileType
            );

            // Store state for the preview modal
            stylePreviewState = { heroId, tileType, groupIndices, entries, group: groupName };

            // Determine accent color for the modal
            const accentMap = { set: '#00d4ff', persona: '#ec4899', item: '#22c55e', base: '#f97316' };
            const accent = accentMap[tileType] || '#00d4ff';

            // Header
            const display = activeIdx !== null ? entries.find(e => e.idx === activeIdx) : entries[0];
            const headThumb = (display && display.thumbnailUrl) || hero.thumbnail;
            document.getElementById('stylePreviewThumb').src = headThumb;
            document.getElementById('stylePreviewTitle').textContent = groupName;
            document.getElementById('stylePreviewSub').textContent = `${entries.length} style variant${entries.length > 1 ? 's' : ''} \u00b7 ${hero.displayName || hero.name}`;

            // Build tile grid
            const grid = document.getElementById('stylePreviewGrid');
            grid.style.setProperty('--sc-accent', accent);
            grid.innerHTML = entries.map(e => {
               const isActive = e.idx === activeIdx;
               const thumb = e.thumbnailUrl || hero.thumbnail;
               const label = e.styleLabel || e.name || `Style ${e.idx + 1}`;
               return `
               <div class="style-preview-tile ${isActive ? 'active' : ''}"
                    style="--sc-accent: ${accent}"
                    onclick="selectStyleFromPreview(${e.idx})">
                  <div class="style-preview-tile-img">
                     <img src="${thumb}" alt="${label}" onerror="this.src='${hero.thumbnail}'" />
                  </div>
                  <div class="style-preview-tile-check">
                     <svg fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                     </svg>
                  </div>
                  <div class="style-preview-tile-label">${label}</div>
               </div>`;
            }).join('');

            document.getElementById('stylePreviewModal').classList.remove('hidden');
         }

         function selectStyleFromPreview(idx) {
            if (!stylePreviewState) return;
            const { heroId, tileType, groupIndices } = stylePreviewState;
            selectStyle(heroId, tileType, idx, groupIndices);

            // Re-render the preview tiles to reflect new selection
            const hero = heroes.find(h => h.id === heroId);
            if (!hero) return;
            const heroSel = getHeroSelection(heroId);
            const entries = stylePreviewState.entries;
            const activeIdx = getActiveStyleIndex(
               entries.map(e => ({ idx: e.idx, set: hero.sets[e.idx] })),
               heroSel, tileType
            );

            // Update active states on tiles
            const tiles = document.querySelectorAll('#stylePreviewGrid .style-preview-tile');
            entries.forEach((e, i) => {
               if (tiles[i]) {
                  tiles[i].classList.toggle('active', e.idx === activeIdx);
               }
            });

            // Update header thumb to show selected variant
            const display = activeIdx !== null ? entries.find(e => e.idx === activeIdx) : entries[0];
            if (display) {
               document.getElementById('stylePreviewThumb').src = display.thumbnailUrl || hero.thumbnail;
            }
         }

         function deselectStylePreview() {
            if (!stylePreviewState) return;
            const { heroId, tileType, groupIndices, entries } = stylePreviewState;
            const heroSel = getHeroSelection(heroId);
            const hero = heroes.find(h => h.id === heroId);

            // Deselect all styles in this group
            entries.forEach(e => {
               if (tileType === 'item') {
                  const ci = heroSel.items ? heroSel.items.indexOf(e.idx) : -1;
                  if (ci >= 0) heroSel.items.splice(ci, 1);
               } else if (tileType === 'base') {
                  if (heroSel.base === e.idx) heroSel.base = null;
               } else {
                  if (heroSel.set === e.idx) heroSel.set = null;
               }
            });
            cleanupEmptySelection(heroId);
            updateSelectionCount();
            notifySelectionChanged();
            renderModalSets();
            renderHeroes();
            closeStylePreview();
         }

         function closeStylePreview() {
            document.getElementById('stylePreviewModal').classList.add('hidden');
            stylePreviewState = null;
         }

         function renderModalSets() {
            const hero = heroes.find((h) => h.id === currentModalHeroId);
            if (!hero) return;

            const heroSel = getHeroSelection(currentModalHeroId);
            const setsGrid = document.getElementById("modalSetsGrid");

            // Partition sets into 5 categories, keeping original indices
            const legacySets = [];
            const customSets = [];
            const personaSets = [];
            const itemSets = [];
            const baseSets = [];
            hero.sets.forEach((set, idx) => {
               const cat = getSetCategory(set);
               if (cat === 'persona') {
                  personaSets.push({ set, idx });
               } else if (cat === 'item') {
                  itemSets.push({ set, idx });
               } else if (cat === 'basehero') {
                  baseSets.push({ set, idx });
               } else if (cat === 'customset') {
                  customSets.push({ set, idx });
               } else {
                  legacySets.push({ set, idx });
               }
            });

            const totalCategories = [legacySets, customSets, personaSets, itemSets, baseSets].filter(c => c.length > 0).length;
            const showHeaders = totalCategories > 1;
            const personaActive = isPersonaActive(currentModalHeroId);
            const hasItemsSelected = heroSel.items && heroSel.items.length > 0;
            let html = '';

            // Section builder helper
            function buildSection(entries, headerClass, label, tileType, notice) {
               if (entries.length === 0) return '';
               let s = '<div class="set-category-section">';
               if (showHeaders) {
                  s += `
                  <div class="set-category-header ${headerClass}">
                     <span class="category-label">${label}</span>
                     <div class="category-line"></div>
                     <span class="category-count">${entries.length}</span>
                  </div>`;
               }
               if (notice) {
                  s += `<div class="exclusion-notice">${notice}</div>`;
               }
               s += '<div class="set-category-grid">';
               // For entries with a styleGroup, render only ONE representative tile per group.
               // The tile's click handler opens the Style Preview Modal for that group.
               const renderedGroups = new Set();
               s += entries.map(({ set, idx }) => {
                  const group = set.styleGroup;
                  if (group) {
                     if (renderedGroups.has(group)) return '';
                     renderedGroups.add(group);
                  }
                  return renderSetTile(set, idx, hero, heroSel, tileType);
               }).join('');
               s += '</div></div>';
               return s;
            }

            // 1. Legacy Sets
            html += buildSection(legacySets, 'legacy', 'Legacy Set', 'set');
            // 2. Custom Sets
            html += buildSection(customSets, 'custom', 'Custom Set', 'set');
            // 3. Persona (shares set slot — selecting one deselects sets and vice versa)
            const personaNotice = hasItemsSelected ? '\u26a0 Selecting a persona will clear items and base' : null;
            html += buildSection(personaSets, 'persona', 'Persona', 'persona', personaNotice);
            // 4. Items
            const itemNotice = personaActive ? '\u26a0 Items are disabled while a persona is active' : null;
            html += buildSection(itemSets, 'item', 'Items', 'item', itemNotice);
            // 5. Base Hero
            const baseNotice = personaActive ? '\u26a0 Base is disabled while a persona is active' : null;
            html += buildSection(baseSets, 'basehero', 'Base Hero', 'base', baseNotice);

            setsGrid.innerHTML = html;
         }

         function navigateHero(direction) {
            if (!currentModalHeroId) return;

            const currentIndex = filteredHeroes.findIndex((h) => h.id === currentModalHeroId);
            if (currentIndex === -1) return;

            let newIndex = currentIndex + direction;

            // Find next hero with sets
            while (newIndex >= 0 && newIndex < filteredHeroes.length) {
               const nextHero = filteredHeroes[newIndex];
               if (nextHero.sets && nextHero.sets.length > 0) {
                  // Apply slide animation
                  const setsGrid = document.getElementById("modalSetsGrid");
                  const animClass = direction > 0 ? "animate-slide-left" : "animate-slide-right";

                  setsGrid.classList.remove("animate-slide-left", "animate-slide-right");
                  void setsGrid.offsetWidth; // Force reflow to restart animation
                  setsGrid.classList.add(animClass);

                  openHeroModal(nextHero.id);
                  return;
               }
               newIndex += direction;
            }
         }

         function navigateSet(direction) {
            const hero = heroes.find((h) => h.id === currentModalHeroId);
            if (!hero || !hero.sets) return;

            focusedSetIndex += direction;
            if (focusedSetIndex < 0) focusedSetIndex = hero.sets.length - 1;
            if (focusedSetIndex >= hero.sets.length) focusedSetIndex = 0;

            renderModalSets();

            // Scroll focused tile into view
            setTimeout(() => {
               const focusedTile = document.querySelector(
                  `.set-tile[data-set-index="${focusedSetIndex}"]`,
               );
               if (focusedTile) {
                  focusedTile.scrollIntoView({ behavior: "smooth", block: "nearest" });
               }
            }, 10);
         }

         function selectFocusedSet() {
            if (currentModalHeroId && focusedSetIndex >= 0) {
               selectSetFromModal(currentModalHeroId, focusedSetIndex);
            }
         }

         function closeModal() {
            document.getElementById("setModal").classList.add("hidden");
            currentModalHeroId = null;
         }

         function confirmAndClose() {
            closeModal();
         }

         // Rule A: Selecting a set (Legacy, Custom, or Persona) — mutually exclusive
         // Selecting a Legacy Set deselects Custom/Persona, and vice versa.
         // When a Persona is selected, items and base are cleared (persona replaces base).
         function selectSet(heroId, setIndex) {
            const sel = getHeroSelection(heroId);
            const hero = heroes.find(h => h.id === heroId);
            // Toggle off if already selected
            if (sel.set === setIndex) {
               sel.set = null;
            } else {
               sel.set = setIndex;
               // If the newly selected set is a Persona, clear items and base
               if (hero && hero.sets[setIndex] && getSetCategory(hero.sets[setIndex]) === 'persona') {
                  sel.items = [];
                  sel.base = null;
               }
            }
            cleanupEmptySelection(heroId);
            focusedSetIndex = setIndex;
            updateSelectionCount();
            notifySelectionChanged();
            renderModalSets();
            renderHeroes();
         }

         // Rule C: Toggle an item ON/OFF (multi-select, tag-exclusive)
         // - Blocked if a Persona set is active (persona cannot combine with items)
         // - Selecting an item deselects any other item with the same tag
         function toggleItem(heroId, setIndex) {
            const sel = getHeroSelection(heroId);
            const hero = heroes.find(h => h.id === heroId);

            // Block if persona is active — user must deselect persona first
            if (isPersonaActive(heroId)) {
               return;
            }

            const idx = sel.items.indexOf(setIndex);
            if (idx >= 0) {
               sel.items.splice(idx, 1); // turn OFF
            } else {
               // Tag exclusivity: deselect items with the same tag
               if (hero) {
                  const sameTagItems = getItemsWithSameTag(hero, setIndex);
                  sameTagItems.forEach(conflictIdx => {
                     const ci = sel.items.indexOf(conflictIdx);
                     if (ci >= 0) sel.items.splice(ci, 1);
                  });
               }
               sel.items.push(setIndex); // turn ON
            }
            cleanupEmptySelection(heroId);
            focusedSetIndex = setIndex;
            updateSelectionCount();
            notifySelectionChanged();
            renderModalSets();
            renderHeroes();
         }

         // Rule B: Toggle base hero — only one active at a time
         function toggleBase(heroId, setIndex) {
            const sel = getHeroSelection(heroId);

            // Block if persona is active — persona replaces base
            if (isPersonaActive(heroId)) {
               return;
            }

            if (sel.base === setIndex) {
               sel.base = null; // turn OFF
            } else {
               sel.base = setIndex; // turn ON (auto-deselects previous)
            }
            cleanupEmptySelection(heroId);
            focusedSetIndex = setIndex;
            updateSelectionCount();
            notifySelectionChanged();
            renderModalSets();
            renderHeroes();
         }

         // Legacy compat: redirect old calls
         function selectSetFromModal(heroId, setIndex) {
            selectSet(heroId, setIndex);
         }

         // Remove hero from selections if nothing is selected
         function cleanupEmptySelection(heroId) {
            if (!hasAnySelection(heroId)) {
               delete selections[heroId];
            }
         }

         function deselectHero() {
            if (currentModalHeroId && selections[currentModalHeroId]) {
               delete selections[currentModalHeroId];
               updateSelectionCount();
               notifySelectionChanged();
               renderHeroes();
            }
            closeModal();
         }

         // ============================================
         // User Interactions
         // ============================================
         function toggleFavorite(heroId) {
            if (favorites.has(heroId)) {
               favorites.delete(heroId);
            } else {
               favorites.add(heroId);
            }
            renderHeroes();
            notifyFavoritesChanged();
         }

         function toggleHasSets() {
            showOnlyWithSets = !showOnlyWithSets;
            const btn = document.getElementById('hasSetsToggle');
            const dot = btn.querySelector('.toggle-dot');
            if (showOnlyWithSets) {
               btn.classList.add('active');
               dot.textContent = '●';
            } else {
               btn.classList.remove('active');
               dot.textContent = '○';
            }
            renderHeroes();
         }

         function clearAllSelections() {
            const selectionCount = Object.keys(selections).length;
            if (selectionCount === 0) {
               updateStatus("No selections to clear");
               return;
            }

            // Build the list of selected heroes with summaries
            const selectedItems = [];
            for (const [heroId, sel] of Object.entries(selections)) {
               const hero = heroes.find((h) => h.id === heroId);
               if (hero) {
                  const summary = getSelectionSummary(hero) || 'Selected';
                  selectedItems.push({
                     heroName: hero.displayName || hero.name,
                     setName: summary,
                     thumbnail: hero.thumbnail,
                  });
               }
            }

            showConfirmWithList(
               "Clear All Selections",
               `This will reset all <span class="text-white font-bold text-base">${selectionCount}</span> hero selection(s) to default.`,
               selectedItems,
            );
         }

         function doClearAllSelections() {
            selections = {};
            updateSelectionCount();
            renderHeroes();
            notifySelectionChanged();
            updateStatus("All selections cleared");
         }

         // Confirmation modal state
         let confirmCallback = null;
         let confirmType = "clearAll"; // "clearAll" or "baseNoSet"

         function showConfirm(title, message) {
            confirmType = "clearAll";
            document.getElementById("confirmTitle").textContent = title;
            document.getElementById("confirmMessage").innerHTML = message;
            document.getElementById("confirmSelectionList").classList.add("hidden");
            document.getElementById("confirmSelectionList").innerHTML = "";
            document.getElementById("confirmModal").classList.remove("hidden");
         }

         function showConfirmBaseNoSet(title, message) {
            confirmType = "baseNoSet";
            document.getElementById("confirmTitle").textContent = title;
            document.getElementById("confirmMessage").innerHTML = message;
            document.getElementById("confirmSelectionList").classList.add("hidden");
            document.getElementById("confirmSelectionList").innerHTML = "";
            
            // Customize Yes button text for confirmation flow
            const yesBtn = document.querySelector("#confirmModal button[onclick='closeConfirm(true)']");
            if (yesBtn) {
               yesBtn.textContent = "Continue";
            }
            
            document.getElementById("confirmModal").classList.remove("hidden");
         }

         function showConfirmWithList(title, message, items) {
            confirmType = "clearAll";
            document.getElementById("confirmTitle").textContent = title;
            document.getElementById("confirmMessage").innerHTML = message;

            const listContainer = document.getElementById("confirmSelectionList");

            if (items && items.length > 0) {
               // Build the list HTML
               const listHtml = items
                  .map(
                     (item) => `
                  <div class="flex items-center gap-3 px-3 py-2 border-b border-amt-border/50 last:border-b-0">
                     <img src="${item.thumbnail}" 
                          alt="${item.heroName}" 
                          class="w-8 h-8 rounded object-cover flex-shrink-0"
                          onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 32 32%22><rect fill=%22%23222%22 width=%2232%22 height=%2232%22/></svg>'" />
                     <div class="flex-1 min-w-0">
                        <div class="text-sm text-white truncate">${item.heroName}</div>
                        <div class="text-xs text-amt-accent truncate">${item.setName}</div>
                     </div>
                  </div>
               `,
                  )
                  .join("");

               listContainer.innerHTML = listHtml;
               listContainer.classList.remove("hidden");
            } else {
               listContainer.classList.add("hidden");
               listContainer.innerHTML = "";
            }

            document.getElementById("confirmModal").classList.remove("hidden");
         }

         function closeConfirm(confirmed) {
            document.getElementById("confirmModal").classList.add("hidden");
            
            // Restore default Yes button text
            const yesBtn = document.querySelector("#confirmModal button[onclick='closeConfirm(true)']");
            if (yesBtn) {
               yesBtn.textContent = "Yes, Clear All";
            }

            if (confirmType === "clearAll") {
               if (confirmed) {
                  doClearAllSelections();
               }
            } else if (confirmType === "baseNoSet") {
               if (window.chrome && window.chrome.webview) {
                  window.chrome.webview.postMessage({
                     type: "baseNoSetConfirmed",
                     confirmed: confirmed
                  });
               }
            }
         }

         function updateSelectionCount() {
            // Count heroes that have any actual selection
            const count = Object.keys(selections).filter(id => hasAnySelection(id)).length;
            document.getElementById("selectionCount").textContent = count;
         }

         // ============================================
         // Notify C#

               window.chrome.webview.postMessage({
                  type: "selectionChanged",
                  selections: selections,

               window.chrome.webview.postMessage({ type: "close" });

            if (e.target.id === "stylePreviewModal") closeStylePreview();
         });

         // Global keyboard handler
         document.addEventListener("keydown", (e) => {
            const modal = document.getElementById("setModal");
            const isModalOpen = !modal.classList.contains("hidden");
            const searchInput = document.getElementById("searchInput");
            const isSearchFocused = document.activeElement === searchInput;

            if (isModalOpen) {
               // Style Preview Modal takes priority: Escape closes it; all other keys are
               // swallowed so the set modal underneath doesn't navigate behind the preview.
               const stylePreview = document.getElementById("stylePreviewModal");
               const isStylePreviewOpen = !stylePreview.classList.contains("hidden");
               if (isStylePreviewOpen) {
                  if (e.key === "Escape") {
                     e.preventDefault();
                     closeStylePreview();
                  }
                  return;
               }

               // Modal navigation
               switch (e.key) {
                  case "ArrowLeft":
                     e.preventDefault();
                     navigateHero(-1);
                     break;
                  case "ArrowRight":
                     e.preventDefault();
                     navigateHero(1);
                     break;
                  case "ArrowUp":
                     e.preventDefault();
                     navigateSet(-1);
                     break;
                  case "ArrowDown":
                     e.preventDefault();
                     navigateSet(1);
                     break;
                  case "Enter":
                     e.preventDefault();
                     selectFocusedSet();
                     confirmAndClose();
                     break;
                  case "Escape":
                     e.preventDefault();
                     closeModal();
                     break;
               }
            } else {
               // Gallery mode - instant search
               if (
                  !isSearchFocused &&
                  e.key.length === 1 &&
                  !e.ctrlKey &&
                  !e.altKey &&
                  !e.metaKey
               ) {
                  // Single character key - focus search and type
                  searchInput.focus();
                  // Don't prevent default - let the character be typed
               } else if (e.key === "Escape" && isSearchFocused) {
                  searchInput.blur();
                  searchInput.value = "";
                  searchQuery = "";
                  renderHeroes();
               }
            }
         });
