      <script>
         "use strict";
         const MAX_LINES = 500;

         /* CDN images marked data-src get a per-launch cache-buster so swapping
            the file on the CDN shows up next app start without a rebuild */
         document.querySelectorAll("img[data-src]").forEach((img) => {
            img.src = img.dataset.src + "?t=" + Date.now();
         });

         /* ════════ JS → C# bridge ════════ */
         function post(type, data = {}) {
            if (window.chrome && window.chrome.webview) {
               window.chrome.webview.postMessage(Object.assign({ type }, data));
            }
         }
         /* generic button → message; stop drag/menu side-effects */
         function send(type, ev) {
            if (ev) ev.stopPropagation();
            hidePatchMenu();
            const el = ev && ev.currentTarget;
            if (el && el.classList.contains("is-disabled")) return;
            post(type);
         }
         function openUrl(url) {
            hidePatchMenu();
            post("openUrl", { url });
         }
         function patchMenuAction(type) {
            hidePatchMenu();
            post(type);
         }
         function copyConsole() {
            const text = [...document.querySelectorAll("#console-body .msg")]
               .map((n) => n.textContent)
               .join("\n");
            post("copyConsole", { text });
         }

         /* ════════ C# → JS API ════════ */
         /* Elements seeded with data-i18n only for their PLACEHOLDER text (version, status) get
            rewritten by applyI18n on every language switch, which would stomp the live value pushed
            from C#. Dropping the attribute on the first dynamic write hands ownership to the host. */
         function claimFromI18n(el) {
            if (el) el.removeAttribute("data-i18n");
            return el;
         }

         function setVersion(v) {
            claimFromI18n(document.getElementById("version")).textContent = v || "";
         }

         /* C# → JS: override the install-card background from banner.json (cache-busted). */
         function setInstallCard(url) {
            const el = document.getElementById("install-card-bg");
            if (!el || !url) return;
            el.style.display = "";
            el.src = url + (url.includes("?") ? "&" : "?") + "t=" + Date.now();
         }

         /* C# → JS: version badges on the What's New card + modal choices. */
         function setNewsVersions(payload) {
            const p = typeof payload === "string" ? JSON.parse(payload) : payload || {};
            if (p.app) {
               ["news-app-ver", "modal-app-ver"].forEach((id) => {
                  const el = document.getElementById(id);
                  if (el) el.textContent = "App " + p.app;
               });
            }
            if (p.modspack) {
               ["news-mods-ver", "modal-mods-ver"].forEach((id) => {
                  const el = document.getElementById(id);
                  if (el) el.textContent = "ModsPack " + p.modspack;
               });
            }
         }

         function setStatus(payload) {
            const p = typeof payload === "string" ? JSON.parse(payload) : payload;
            const dot = document.getElementById("status-dot");
            const text = claimFromI18n(document.getElementById("status-text"));
            const refresh = document.getElementById("status-refresh");
            refresh.classList.remove("spin");
            dot.style.background = p.color;
            dot.style.boxShadow = "0 0 8px " + p.color;
            text.textContent = p.text || "";
            text.style.color = p.color;
            text.title = p.tooltip || "";
            dot.title = p.tooltip || "";
         }

         function showChecking() {
            const dot = document.getElementById("status-dot");
            const text = claimFromI18n(document.getElementById("status-text"));
            const refresh = document.getElementById("status-refresh");
            dot.style.background = "var(--primary)";
            dot.style.boxShadow = "0 0 8px var(--primary)";
            text.textContent = window.t ? window.t("status.checking.text") : "Checking…";
            text.style.color = "var(--primary)";
            // The previous status' tooltip must not linger over "Checking…".
            text.title = "";
            dot.title = "";
            refresh.classList.add("spin");
         }

         function setPatchButton(status, isError) {
            const btn = document.getElementById("btn-patch");
            btn.classList.remove("ready", "update", "error");
            if (isError) btn.classList.add("error");
            else if (status === "ready") btn.classList.add("ready");
            else if (status === "needUpdate") btn.classList.add("update");
         }

         function setButtonStates(payload) {
            const s = typeof payload === "string" ? JSON.parse(payload) : payload;
            const map = {
               autoDetect: "btn-autoDetect",
               manualDetect: "btn-manualDetect",
               install: "btn-install",
               disable: "btn-disable",
               patch: "btn-patch",
               misc: "btn-misc",
               hero: "btn-hero",
               tweak: "btn-tweak",
            };
            for (const key in map) {
               const el = document.getElementById(map[key]);
               if (!el || !(key in s)) continue;
               el.classList.toggle("is-disabled", !s[key]);
            }
            if ("detectHighlight" in s) {
               const hl = !!s.detectHighlight;
               document.getElementById("btn-autoDetect").classList.toggle("highlight", hl);
               document.getElementById("btn-manualDetect").classList.toggle("highlight", hl);
            }
         }

         function setDotaWarning(on) {
            document
               .getElementById("warning")
               .classList.toggle("show", on === true || on === "true");
         }

         // Transient green confirmation shown when the Dota 2 install path is attached
         // (startup auto-detect, saved path, or manual detect). Auto-hides after a few seconds.
         let _pathFoundTimer = null;
         function showPathFound(path) {
            const banner = document.getElementById("pathFoundBanner");
            if (!banner) return;
            const val = document.getElementById("pathFoundText");
            if (val) val.textContent = path || "";
            banner.classList.add("show");
            if (_pathFoundTimer) clearTimeout(_pathFoundTimer);
            _pathFoundTimer = setTimeout(() => banner.classList.remove("show"), 4000);
         }

         function appendLog(text, category) {
            const body = document.getElementById("console-body");
            const atBottom = body.scrollHeight - body.scrollTop - body.clientHeight < 40;
            const line = document.createElement("div");
            line.className = "log-line " + (category || "default");
            const bar = document.createElement("div");
            bar.className = "bar";
            const msg = document.createElement("div");
            msg.className = "msg";
            msg.textContent = text;
            line.appendChild(bar);
            line.appendChild(msg);
            body.appendChild(line);
            while (body.childElementCount > MAX_LINES) body.removeChild(body.firstChild);
            if (atBottom) body.scrollTop = body.scrollHeight;
         }

         /* Localized console line: segJson carries i18n keys (see C# LogSegment / Logger.LogLocalized),
            stored on the element so applyI18n can re-translate it live when the language changes. */
         function appendLogI18n(segJson, category) {
            const body = document.getElementById("console-body");
            const atBottom = body.scrollHeight - body.scrollTop - body.clientHeight < 40;
            let segs;
            try { segs = JSON.parse(segJson); } catch (e) { segs = []; }
            const line = document.createElement("div");
            line.className = "log-line " + (category || "default");
            line.setAttribute("data-i18n-log", segJson);
            const bar = document.createElement("div");
            bar.className = "bar";
            const msg = document.createElement("div");
            msg.className = "msg";
            /* Pre-bootstrap fallback: show literal strings / raw keys instead of a blank line;
               applyI18n re-translates via data-i18n-log once the localizer arrives. */
            msg.textContent = window.renderLogSegments
               ? window.renderLogSegments(segs)
               : segs.map(function (s) { return typeof s === "string" ? s : (s && s.k) || ""; }).join("");
            line.appendChild(bar);
            line.appendChild(msg);
            body.appendChild(line);
            while (body.childElementCount > MAX_LINES) body.removeChild(body.firstChild);
            if (atBottom) body.scrollTop = body.scrollHeight;
         }

         function clearLog() {
            document.getElementById("console-body").innerHTML = "";
         }

         /* ════════ banner carousel ════════ */
         let _carSlides = [];
         let _carIndex = 0;
         let _carTimer = null;

         /* C# → JS: Skin Selector "Latest Updates" cards. Payload shape lives in
            SetUpdateResolver.SetUpdateCard (heroId/heroName/setThumbnail/daysAgo/...) — keep in sync.
            Cards are built with createElement/textContent: hero names are remote data. */
         function loadLatestUpdates(payload) {
            const cards = typeof payload === "string" ? JSON.parse(payload) : payload;
            if (!Array.isArray(cards) || cards.length === 0) return;
            const row = document.getElementById("updates-row");
            row.innerHTML = "";
            cards.slice(0, 12).forEach(function (c) {
               const card = document.createElement("button");
               card.className = "update-card";
               card.title = c.setName || "";
               card.onclick = function (ev) { send("skinSelector", ev); };
               const img = document.createElement("img");
               img.src = c.setThumbnail || "";
               img.alt = "";
               img.loading = "lazy";
               img.onerror = function () { card.remove(); updatesArrowState(); };
               const cap = document.createElement("div");
               cap.className = "uc-cap";
               const hero = document.createElement("div");
               hero.className = "uc-hero";
               hero.textContent = c.heroName || "";
               const date = document.createElement("div");
               date.className = "uc-date";
               date.textContent = c.daysAgo === 0 ? "Today" : c.daysAgo === 1 ? "Yesterday" : c.daysAgo + "d ago";
               cap.appendChild(hero);
               cap.appendChild(date);
               card.appendChild(img);
               card.appendChild(cap);
               if (c.daysAgo <= 2) {
                  const badge = document.createElement("span");
                  badge.className = "uc-new";
                  badge.textContent = "NEW";
                  card.appendChild(badge);
               }
               row.appendChild(card);
            });
            document.getElementById("updates-count").textContent = cards.length + " new";
            document.getElementById("updates-strip").classList.add("show");
            /* Property handlers (not addEventListener) so a repeat push can't stack duplicates. */
            row.onscroll = updatesArrowState;
            row.onwheel = function (e) {
               if (row.scrollWidth <= row.clientWidth) return;
               e.preventDefault();
               row.scrollLeft += e.deltaY;
            };
            updatesArrowState();
         }

         /* Pages the updates row left/right (dir = ±1); scroll-behavior:smooth animates it. */
         function updatesScroll(dir) {
            const row = document.getElementById("updates-row");
            row.scrollLeft += dir * Math.max(row.clientWidth - 80, 160);
         }

         /* Hides each arrow at its end of the row, like the Skin Selector carousel. */
         function updatesArrowState() {
            const row = document.getElementById("updates-row");
            const max = row.scrollWidth - row.clientWidth;
            document.getElementById("updates-prev").classList.toggle("disabled", row.scrollLeft <= 2);
            document.getElementById("updates-next").classList.toggle("disabled", row.scrollLeft >= max - 2);
         }

         /* C# → JS: single bundled-banner fallback (kept for when no R2 manifest is present). */
         function setBanner(dataUri) {
            if (!dataUri || _carSlides.length > 0) return;
            renderCarousel([{ image: dataUri, link: "", title: "" }]);
         }

         /* C# → JS: R2 carousel slides [{ image, link, title }]. */
         function loadBanners(payload) {
            const slides = typeof payload === "string" ? JSON.parse(payload) : payload;
            if (!Array.isArray(slides) || slides.length === 0) return;
            renderCarousel(slides);
         }

         function renderCarousel(slides) {
            _carSlides = slides;
            _carIndex = 0;
            const track = document.getElementById("carousel-track");
            const dots = document.getElementById("car-dots");
            const carousel = document.getElementById("carousel");
            track.innerHTML = "";
            dots.innerHTML = "";

            slides.forEach((s, i) => {
               const slide = document.createElement("div");
               slide.className = "slide" + (s.link ? " link" : "");
               if (s.link) slide.onclick = () => openUrl(s.link);

               const img = document.createElement("img");
               img.alt = s.title || "";
               // A slide whose CDN image fails shows the panel surface + caption instead of the
               // broken-image glyph (same guard the install card uses).
               img.onerror = () => {
                  img.style.display = "none";
               };
               img.src = s.image;
               slide.appendChild(img);

               if (s.title) {
                  const cap = document.createElement("div");
                  cap.className = "cap";
                  cap.textContent = s.title;
                  slide.appendChild(cap);
               }
               track.appendChild(slide);

               const dot = document.createElement("span");
               dot.className = "car-dot" + (i === 0 ? " active" : "");
               dot.onclick = (e) => {
                  e.stopPropagation();
                  carouselGo(i);
               };
               dots.appendChild(dot);
            });

            carousel.classList.toggle("multi", slides.length > 1);
            updateCarousel();
            startCarouselAuto();
         }

         function updateCarousel() {
            const track = document.getElementById("carousel-track");
            track.style.transform = "translateX(-" + _carIndex * 100 + "%)";
            document.querySelectorAll("#car-dots .car-dot").forEach((d, i) => {
               d.classList.toggle("active", i === _carIndex);
            });
         }

         function carouselGo(i) {
            if (_carSlides.length === 0) return;
            _carIndex = (i + _carSlides.length) % _carSlides.length;
            updateCarousel();
            startCarouselAuto();
         }
         function carouselNext(ev) {
            if (ev) ev.stopPropagation();
            carouselGo(_carIndex + 1);
         }
         function carouselPrev(ev) {
            if (ev) ev.stopPropagation();
            carouselGo(_carIndex - 1);
         }

         function startCarouselAuto() {
            stopCarouselAuto();
            if (_carSlides.length <= 1) return;
            if (window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
            // Don't advance while the window is hidden/minimized — the user would come back to a
            // slide they never saw start.
            _carTimer = setInterval(() => {
               if (!document.hidden) carouselGo(_carIndex + 1);
            }, 5000);
         }
         function stopCarouselAuto() {
            if (_carTimer) {
               clearInterval(_carTimer);
               _carTimer = null;
            }
         }

         (function initCarousel() {
            const c = document.getElementById("carousel");
            if (!c) return;
            c.addEventListener("mouseenter", stopCarouselAuto);
            c.addEventListener("mouseleave", startCarouselAuto);
         })();

         /* ════════ confirm modal (replaces native Yes/No MessageBox) ════════ */
         /* C# → JS. payload = { id, eyebrow, heading, body, note, confirmText, cancelText }.
            The result is posted back as { type:"shellModalResult", id, ok } and the C# side
            resolves the awaiting Task. id ties the reply to the originating request. */
         let _confirmId = null;
         let _confirmLocked = false; // true while the Continue countdown is running
         let _confirmCdTimer = null;

         function showShellConfirm(payload) {
            const p = typeof payload === "string" ? JSON.parse(payload) : payload || {};
            _confirmId = typeof p.id === "number" ? p.id : null;
            // Accent variant (reset every time — the modal is reused across callers).
            document
               .getElementById("confirm-modal")
               .classList.toggle("confirm--warn", p.accent === "warn");
            document.getElementById("confirm-eyebrow").textContent = p.eyebrow || "Confirm";
            document.getElementById("confirm-heading").textContent = p.heading || "";
            document.getElementById("confirm-text").textContent = p.body || "";

            const note = document.getElementById("confirm-note");
            if (p.note) {
               note.textContent = p.note;
               note.style.display = "";
            } else {
               note.textContent = "";
               note.style.display = "none";
            }

            const okBtn = document.getElementById("confirm-ok");
            const okLabel = p.confirmText || "Continue";
            const cancel = document.getElementById("confirm-cancel");
            cancel.textContent = p.cancelText || "Cancel";

            // Reset any prior countdown state.
            if (_confirmCdTimer) {
               clearInterval(_confirmCdTimer);
               _confirmCdTimer = null;
            }
            _confirmLocked = false;
            okBtn.disabled = false;
            okBtn.textContent = okLabel;

            // Optional countdown: gate Continue for N seconds (e.g. the beta gate).
            const cd = parseInt(p.countdown, 10) || 0;
            if (cd > 0) {
               _confirmLocked = true;
               okBtn.disabled = true;
               let remaining = cd;
               const render = () => {
                  okBtn.textContent = okLabel + " (" + remaining + ")";
               };
               render();
               _confirmCdTimer = setInterval(() => {
                  remaining--;
                  if (remaining <= 0) {
                     clearInterval(_confirmCdTimer);
                     _confirmCdTimer = null;
                     _confirmLocked = false;
                     okBtn.disabled = false;
                     okBtn.textContent = okLabel;
                  } else {
                     render();
                  }
               }, 1000);
            }

            hidePatchMenu();
            document.getElementById("confirm-modal").classList.add("show");
            (cd > 0 ? cancel : okBtn).focus();
         }

         function confirmActive() {
            return document.getElementById("confirm-modal").classList.contains("show");
         }

         function resolveConfirm(ok) {
            if (!confirmActive()) return;
            // Continue is blocked while the countdown runs; Cancel/close stay available.
            if (ok && _confirmLocked) return;
            if (_confirmCdTimer) {
               clearInterval(_confirmCdTimer);
               _confirmCdTimer = null;
            }
            _confirmLocked = false;
            document.getElementById("confirm-modal").classList.remove("show");
            const id = _confirmId;
            _confirmId = null;
            post("shellModalResult", { id, ok: !!ok });
         }

         function onConfirmBackdrop(ev) {
            if (ev.target === ev.currentTarget) resolveConfirm(false);
         }

         /* ════════ install log modal (complete + failure cards) ════════ */
         /* C# → JS. payload = { title, body, lines: [{ t, c }] }. lines is the curated
            InstallReport from the install run (simple user-facing steps, no URLs/paths);
            when absent the modal falls back to an excerpt of the console. */
         function showInstallFailure(payload) {
            const p = typeof payload === "string" ? JSON.parse(payload) : payload || {};
            openInstallLog(p.title, p.body, "error", true, p.lines);
         }

         /* C# → JS. Install-complete card: green accent, Done + Show Log actions; the log
            excerpt stays hidden until Show Log is pressed. */
         function showInstallComplete(payload) {
            const p = typeof payload === "string" ? JSON.parse(payload) : payload || {};
            openInstallLog(p.title, p.body, "success", false, p.lines);
         }

         /* variant: "error" (red accent) or "success" (green accent). withLog=false keeps the
            log excerpt collapsed behind the Show Log action (install-complete card). */
         function openInstallLog(title, body, variant, withLog = true, reportLines = null) {
            const ok = variant === "success";
            const modal = document.querySelector("#failure-modal .modal");
            modal.classList.toggle("failure", !ok);
            modal.classList.toggle("logok", ok);
            document.getElementById("failure-eyebrow").textContent = window.t
               ? window.t(ok ? "shell.failure.eyebrowOk" : "shell.failure.eyebrow")
               : ok ? "Complete" : "Error";
            document.getElementById("failure-heading").textContent = title || "";
            document.getElementById("failure-text").textContent = body || "";

            // Collapsed log (complete card) ↔ visible log (failure card / after Show Log).
            document.querySelector("#failure-modal .failure-log").style.display = withLog ? "" : "none";
            document.getElementById("failure-showlog").style.display = withLog ? "none" : "";
            document.getElementById("failure-copy").style.display = withLog ? "" : "none";
            document.getElementById("failure-close").textContent = window.t
               ? window.t(ok ? "common.done" : "common.close")
               : ok ? "Done" : "Close";

            const logBody = document.getElementById("failure-log-body");
            logBody.innerHTML = "";

            if (Array.isArray(reportLines) && reportLines.length > 0) {
               // Curated install report from C# — the preferred source.
               reportLines.forEach((r) => {
                  const line = document.createElement("div");
                  line.className = "log-line " + (r.c || "default");
                  const bar = document.createElement("div");
                  bar.className = "bar";
                  const msg = document.createElement("div");
                  msg.className = "msg";
                  msg.textContent = r.t || "";
                  line.appendChild(bar);
                  line.appendChild(msg);
                  logBody.appendChild(line);
               });
            } else {
               // Fallback: excerpt of the shell console (no report was collected).
               const all = [...document.querySelectorAll("#console-body .log-line")];
               let lines = ok
                  ? all.slice(-12)
                  : all.filter((l) => l.classList.contains("error") || l.classList.contains("warning")).slice(-12);
               if (lines.length === 0) lines = all.slice(-8);
               if (lines.length === 0) {
                  const empty = document.createElement("div");
                  empty.className = "failure-log-empty";
                  empty.textContent = window.t ? window.t("shell.failure.empty") : "No log entries captured.";
                  logBody.appendChild(empty);
               } else {
                  lines.forEach((l) => {
                     const clone = l.cloneNode(true);
                     clone.removeAttribute("data-i18n-log"); // snapshot — don't re-translate live
                     logBody.appendChild(clone);
                  });
               }
            }

            hidePatchMenu();
            document.getElementById("failure-modal").classList.add("show");
            logBody.scrollTop = logBody.scrollHeight;
            document.getElementById("failure-close").focus();
         }

         function failureActive() {
            return document.getElementById("failure-modal").classList.contains("show");
         }

         function revealInstallLog() {
            document.querySelector("#failure-modal .failure-log").style.display = "";
            document.getElementById("failure-showlog").style.display = "none";
            document.getElementById("failure-copy").style.display = "";
            const logBody = document.getElementById("failure-log-body");
            logBody.scrollTop = logBody.scrollHeight;
         }

         /* ════════ toasts (replaces tray balloon for in-app feedback) ════════ */
         /* C# → JS. payload = { title, message, variant: "success|error|info", timeout }. */
         const TOAST_ICONS = {
            success:
               '<path d="M20 6 9 17l-5-5" />',
            error:
               '<circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="13" /><line x1="12" y1="16" x2="12.01" y2="16" />',
            info:
               '<circle cx="12" cy="12" r="10" /><line x1="12" y1="11" x2="12" y2="16" /><line x1="12" y1="8" x2="12.01" y2="8" />',
         };

         function showToast(payload) {
            const p = typeof payload === "string" ? JSON.parse(payload) : payload || {};
            const variant = TOAST_ICONS[p.variant] ? p.variant : "success";
            const host = document.getElementById("toast-host");

            const toast = document.createElement("div");
            toast.className = "toast " + variant;

            const ico = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            ico.setAttribute("viewBox", "0 0 24 24");
            ico.setAttribute("fill", "none");
            ico.setAttribute("stroke", "currentColor");
            ico.setAttribute("stroke-width", "2.2");
            ico.setAttribute("stroke-linecap", "round");
            ico.setAttribute("stroke-linejoin", "round");
            ico.innerHTML = TOAST_ICONS[variant];
            const icoWrap = document.createElement("span");
            icoWrap.className = "toast-ico";
            icoWrap.appendChild(ico);

            const body = document.createElement("div");
            body.className = "toast-body";
            if (p.title) {
               const t = document.createElement("div");
               t.className = "toast-title";
               t.textContent = p.title;
               body.appendChild(t);
            }
            if (p.message) {
               const m = document.createElement("div");
               m.className = "toast-msg";
               m.textContent = p.message;
               body.appendChild(m);
            }
            const close = document.createElement("button");
            close.className = "toast-x";
            close.title = window.t ? window.t("shell.toast.dismiss") : "Dismiss";
            close.innerHTML =
               '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18" /><line x1="18" y1="6" x2="6" y2="18" /></svg>';

            let timer = null;
            const dismiss = () => {
               if (timer) clearTimeout(timer);
               toast.classList.add("hide");
               toast.addEventListener("animationend", () => toast.remove(), { once: true });
            };
            close.onclick = dismiss;

            toast.appendChild(icoWrap);
            toast.appendChild(body);
            toast.appendChild(close);
            host.appendChild(toast);

            const timeout = typeof p.timeout === "number" && p.timeout > 0 ? p.timeout : 4000;
            timer = setTimeout(dismiss, timeout);

            // Hovering holds the toast open (a long message must not vanish mid-read); leaving
            // re-arms the full timeout.
            toast.addEventListener("mouseenter", () => {
               if (timer) {
                  clearTimeout(timer);
                  timer = null;
               }
            });
            toast.addEventListener("mouseleave", () => {
               if (!toast.classList.contains("hide")) timer = setTimeout(dismiss, timeout);
            });
         }

         /* ════════ onboarding guide (DOM-native, replaces GDI overlay) ════════ */
         let _obSteps = [];
         let _obIndex = 0;

         function onboardActive() {
            return document.getElementById("onboard").classList.contains("show");
         }

         /* C# → JS entry. payload = [{ target, title, desc, pad }] */
         function startOnboarding(payload) {
            _obSteps = typeof payload === "string" ? JSON.parse(payload) : payload;
            if (!Array.isArray(_obSteps) || _obSteps.length === 0) return;
            _obIndex = 0;
            hidePatchMenu();
            const dots = document.getElementById("ob-dots");
            dots.innerHTML = "";
            for (let i = 0; i < _obSteps.length; i++) {
               const d = document.createElement("span");
               d.className = "ob-dot";
               dots.appendChild(d);
            }
            document.getElementById("onboard").classList.add("show");
            window.addEventListener("resize", positionOnboard);
            renderOnboard();
         }

         function renderOnboard() {
            const step = _obSteps[_obIndex];
            if (!step) return;
            document.getElementById("ob-counter").textContent =
               "[ " + (_obIndex + 1) + " / " + _obSteps.length + " ]";
            document.getElementById("ob-title").textContent = step.title || "";
            document.getElementById("ob-desc").textContent = step.desc || "";

            const last = _obIndex === _obSteps.length - 1;
            document.getElementById("ob-next").textContent = last
               ? (window.t ? window.t("shell.onboard.gotIt") : "Got it")
               : (window.t ? window.t("shell.onboard.next") : "Next →");
            document.getElementById("ob-skip").style.visibility = last ? "hidden" : "visible";

            const dots = document.querySelectorAll("#ob-dots .ob-dot");
            dots.forEach((d, i) => {
               d.classList.toggle("active", i === _obIndex);
               d.classList.toggle("done", i < _obIndex);
            });

            positionOnboard();
         }

         function positionOnboard() {
            const step = _obSteps[_obIndex];
            if (!step) return;
            const el = document.getElementById(step.target);
            const spot = document.getElementById("onboard-spot");
            const card = document.getElementById("onboard-card");
            const pad = typeof step.pad === "number" ? step.pad : 8;
            const vw = window.innerWidth;
            const vh = window.innerHeight;

            let rect;
            if (el) {
               const r = el.getBoundingClientRect();
               rect = {
                  left: r.left - pad,
                  top: r.top - pad,
                  width: r.width + pad * 2,
                  height: r.height + pad * 2,
               };
            } else {
               rect = { left: vw / 2 - 80, top: vh / 2 - 24, width: 160, height: 48 };
            }

            spot.style.left = rect.left + "px";
            spot.style.top = rect.top + "px";
            spot.style.width = rect.width + "px";
            spot.style.height = rect.height + "px";

            // Place card: prefer right, then left, then below, then above the spotlight.
            const cw = card.offsetWidth || 300;
            const ch = card.offsetHeight || 190;
            const gap = 16;
            const m = 12;
            let cx, cy;
            if (rect.left + rect.width + gap + cw <= vw - m) {
               cx = rect.left + rect.width + gap;
               cy = rect.top;
            } else if (rect.left - gap - cw >= m) {
               cx = rect.left - gap - cw;
               cy = rect.top;
            } else if (rect.top + rect.height + gap + ch <= vh - m) {
               cx = rect.left;
               cy = rect.top + rect.height + gap;
            } else {
               cx = rect.left;
               cy = rect.top - gap - ch;
            }
            cx = Math.max(m, Math.min(cx, vw - cw - m));
            cy = Math.max(m, Math.min(cy, vh - ch - m));
            card.style.left = cx + "px";
            card.style.top = cy + "px";
         }

         function onboardNext() {
            if (_obIndex >= _obSteps.length - 1) {
               finishOnboarding();
               return;
            }
            _obIndex++;
            renderOnboard();
         }
         function onboardPrev() {
            if (_obIndex <= 0) return;
            _obIndex--;
            renderOnboard();
         }
         function onboardSkip() {
            finishOnboarding();
         }
         function finishOnboarding() {
            const root = document.getElementById("onboard");
            if (!root.classList.contains("show")) return;
            root.classList.remove("show");
            window.removeEventListener("resize", positionOnboard);
            post("onboardingDone");
         }

         /* ════════ window drag (titlebar) ════════ */
         document.getElementById("titlebar").addEventListener("mousedown", (e) => {
            if (onboardActive()) return;
            if (e.target.closest(".win-btn")) return;
            post("startDrag");
         });

         /* keyboard: onboarding nav takes priority while active, else ESC closes patch menu */
         document.addEventListener("keydown", (e) => {
            if (confirmActive()) {
               if (e.key === "Escape") resolveConfirm(false);
               else if (e.key === "Enter") {
                  // If a button in the modal has focus (e.g. the user tabbed to Cancel), let the
                  // native Enter→click on THAT button win. Defaulting Enter to Continue here would
                  // turn a deliberate Cancel into a Continue on a destructive-action gate.
                  const f = document.activeElement;
                  if (f && f.tagName === "BUTTON" && f.closest("#confirm-modal")) return;
                  e.preventDefault();
                  resolveConfirm(true);
               }
               return;
            }
            if (failureActive()) {
               if (e.key === "Escape") closeFailureModal();
               return;
            }
            if (onboardActive()) {
               if (e.key === "Escape") {
                  finishOnboarding();
               } else if (e.key === "ArrowRight" || e.key === "Enter" || e.key === " ") {
                  e.preventDefault();
                  onboardNext();
               } else if (e.key === "ArrowLeft") {
                  onboardPrev();
               }
               return;
            }
            if (e.key === "Escape") {
               if (newsModalActive()) {
                  closeNewsModal();
                  return;
               }
               hidePatchMenu();
            }
         });
