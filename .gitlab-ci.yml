stages:
   - test
   - docs

variables:
   PROJECT_FILE: "ArdysaModsTools.csproj"
   SOLUTION_FILE: "AMT 2.0.sln"
   GITHUB_REPO: "Anneardysa/ArdysaModsTools"

default:
   tags:
      - windows

# Build + unit tests on branches and merge requests.
build-test:
   stage: test
   rules:
      - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"'
   script:
      - dotnet restore "$env:SOLUTION_FILE"
      - dotnet build "$env:SOLUTION_FILE" -c Release --no-restore
      - dotnet test "$env:SOLUTION_FILE" -c Release --no-build

# Sync curated docs from GitLab → the public GitHub repo. Never copies source.
# allow_failure: a missing GITHUB_PAT (or transient push issue) must not red the pipeline.
sync-docs:
   stage: docs
   allow_failure: true
   rules:
      - if: '$CI_COMMIT_BRANCH == "main"'
        changes:
           - README.md
           - LICENSE
           - NOTICE
           - PRIVACY.md
           - CHANGELOG.md
           - docs/README.md
           - docs/TROUBLESHOOTING.md
           - docs/user/**/*
           - docs/dev/SECURITY.md
   script:
      - |
         $ErrorActionPreference = 'Stop'
         if ([string]::IsNullOrWhiteSpace($env:GITHUB_PAT)) { Write-Host "GITHUB_PAT not set — skipping docs sync."; exit 0 }

         # Allowlist of curated, public docs. Anything not listed is never pushed to GitHub.
         $allow = @('README.md','LICENSE','NOTICE','PRIVACY.md','CHANGELOG.md',
                    'docs/README.md','docs/TROUBLESHOOTING.md','docs/user','docs/dev/SECURITY.md')

         $work = Join-Path $env:TEMP "ghdocs"
         Remove-Item -Recurse -Force $work -ErrorAction SilentlyContinue
         git clone --depth 1 "https://x-access-token:$($env:GITHUB_PAT)@github.com/$($env:GITHUB_REPO).git" $work
         foreach ($p in $allow) {
           if (Test-Path $p) {
             $dest = Join-Path $work $p
             New-Item -ItemType Directory -Force -Path (Split-Path $dest) | Out-Null
             Copy-Item -Recurse -Force $p $dest
           }
         }
         Push-Location $work
         git config user.email "ci@ardysamods.my.id"
         git config user.name  "Ardysa CI"
         git add -A
         if (git status --porcelain) {
           git commit -m "docs: sync from GitLab ($($env:CI_COMMIT_SHORT_SHA))"
           git push origin HEAD:main
         } else { Write-Host "No doc changes to sync." }
         Pop-Location
