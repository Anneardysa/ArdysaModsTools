# GitLab CI/CD — ArdysaModsTools
# =============================================================================
# This is the canonical build/release pipeline (GitLab is the private primary).
# GitHub is docs-only + a public release-download mirror; it does NOT build.
#
# RUNNER: a SELF-HOSTED Windows runner registered with the tag `windows`,
#         using the `pwsh` (PowerShell 7+) shell executor.
#   gitlab-runner register --executor shell --shell pwsh --tag-list windows
#
# RUNNER PREREQUISITES (install once on the machine; jobs assume them on PATH):
#   - .NET 8 SDK
#   - Inno Setup 6 (`iscc` on PATH)
#   - rclone
#   - git
#
# REQUIRED CI/CD VARIABLES (Settings → CI/CD → Variables; masked + protected):
#   - R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_ENDPOINT   (Cloudflare R2)
#   - GITHUB_PAT   (GitHub fine-grained/classic PAT, `repo`/Contents:rw — used to
#                   create the public GitHub Release and to push docs to GitHub)
#   - (later) SignPath signing credentials — see the `# TODO: sign` markers.
# =============================================================================

stages:
  - test
  - build
  - publish
  - docs

variables:
  PROJECT_NAME: "ArdysaModsTools"
  PROJECT_FILE: "ArdysaModsTools.csproj"
  SOLUTION_FILE: "AMT 2.0.sln"
  DOTNET_RUNTIME_VERSION: "8.0.24"
  GITHUB_REPO: "Anneardysa/ArdysaModsTools"
  R2_REMOTE: "r2"
  R2_BUCKET: "modspack-asset"
  R2_RELEASES_PATH: "releases"
  CDN_BASE_URL: "https://cdn.ardysamods.my.id"
  RELEASES_TO_KEEP: "3"

# Every job runs on the self-hosted Windows runner.
default:
  tags:
    - windows

# -----------------------------------------------------------------------------
# test — build + unit tests on branches, MRs, and tags
# -----------------------------------------------------------------------------
build-test:
  stage: test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
  script:
    - dotnet restore "$env:PROJECT_FILE"
    - dotnet build "$env:SOLUTION_FILE" -c Release --no-restore
    - dotnet test "$env:SOLUTION_FILE" -c Release --no-build

# -----------------------------------------------------------------------------
# build — on a vX.Y.Z tag: produce installer + SHA256SUMS (ported from release.yml)
# -----------------------------------------------------------------------------
build-installer:
  stage: build
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
  script:
    - |
      $version = $env:CI_COMMIT_TAG -replace '^v',''
      Write-Host "Building v$version"

      dotnet restore "$env:PROJECT_FILE"
      dotnet publish "$env:PROJECT_FILE" -c Release -r win-x64 --self-contained true `
        -p:PublishSingleFile=false -o publish/installer

      # Bundle the .NET Desktop runtime installer (skip if already present)
      $rt = $env:DOTNET_RUNTIME_VERSION
      $rtDir = "tools/dotnet"
      $rtFile = "$rtDir/windowsdesktop-runtime-$rt-win-x64.exe"
      New-Item -ItemType Directory -Force -Path $rtDir | Out-Null
      if (-not (Test-Path $rtFile)) {
        $ProgressPreference = 'SilentlyContinue'
        Invoke-WebRequest -UseBasicParsing `
          -Uri "https://builds.dotnet.microsoft.com/dotnet/WindowsDesktop/$rt/windowsdesktop-runtime-$rt-win-x64.exe" `
          -OutFile $rtFile
      }

      # Stamp version into the Inno Setup script and compile
      $iss = "Build/Installer/$($env:PROJECT_NAME).iss"
      $numeric = ($version -replace '-.*$','')
      $parts = $numeric.Split('.'); while ($parts.Count -lt 4) { $parts += '0' }
      $numeric = ($parts[0..3]) -join '.'
      $c = Get-Content $iss -Raw
      $c = $c -replace '#define MyAppVersion ".*"', "#define MyAppVersion `"$version`""
      $c = $c -replace '#define MyAppVersionNumeric ".*"', "#define MyAppVersionNumeric `"$numeric`""
      Set-Content $iss $c
      iscc $iss
      if ($LASTEXITCODE -ne 0) { throw "Inno Setup failed ($LASTEXITCODE)" }

      # Collect artifacts + checksum
      $installer = "$($env:PROJECT_NAME)_Setup_$version.exe"
      New-Item -ItemType Directory -Force -Path release | Out-Null
      Copy-Item "Build/Installer/Output/*.exe" "release/$installer"

      # TODO: sign — run SignPath (or signtool) on "release/$installer" here, BEFORE hashing.

      $hash = (Get-FileHash "release/$installer" -Algorithm SHA256).Hash
      "$hash  $installer" | Out-File "release/SHA256SUMS.txt" -Encoding utf8

      # Pass values to later stages
      "VERSION=$version"            | Out-File build.env -Encoding ascii -Append
      "INSTALLER=$installer"        | Out-File build.env -Encoding ascii -Append
      "INSTALLER_SHA256=$hash"      | Out-File build.env -Encoding ascii -Append
      Write-Host "Built $installer  sha256=$hash"
  artifacts:
    paths:
      - release/
    reports:
      dotenv: build.env
    expire_in: 1 week

# -----------------------------------------------------------------------------
# publish — create the public GitHub Release (download mirror + What's New fallback)
# -----------------------------------------------------------------------------
github-release:
  stage: publish
  needs: ["build-installer"]
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
  script:
    - |
      $headers = @{
        'User-Agent'           = 'ArdysaModsTools-CI'
        'Accept'               = 'application/vnd.github+json'
        'Authorization'        = "Bearer $($env:GITHUB_PAT)"
        'X-GitHub-Api-Version' = '2022-11-28'
      }
      # TODO: notes — source release notes (e.g. extract this version's section from
      # CHANGELOG.md). For now use a minimal body; What's New still renders it.
      $body = @{
        tag_name         = $env:CI_COMMIT_TAG
        name             = "v$($env:VERSION)"
        body             = "Release v$($env:VERSION). Download from https://ardysamods.my.id"
        draft            = $false
        prerelease       = ($env:VERSION -match '-')
        target_commitish = 'main'
      } | ConvertTo-Json
      $rel = Invoke-RestMethod -Method Post -Headers $headers `
        -Uri "https://api.github.com/repos/$($env:GITHUB_REPO)/releases" -Body $body
      $upload = ($rel.upload_url -replace '\{.*\}','')
      foreach ($f in Get-ChildItem release) {
        Invoke-RestMethod -Method Post -InFile $f.FullName `
          -Headers ($headers + @{ 'Content-Type' = 'application/octet-stream' }) `
          -Uri "$upload`?name=$($f.Name)" | Out-Null
        Write-Host "Uploaded $($f.Name) to GitHub Release"
      }

# -----------------------------------------------------------------------------
# publish — upload binaries to R2 + refresh releases.json & whatsnew.json
# (ports sync-release-to-r2.yml incl. the sha256 + build + no-asset guard hardening)
# -----------------------------------------------------------------------------
publish-r2:
  stage: publish
  needs: ["build-installer", "github-release"]
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
  script:
    - |
      $ErrorActionPreference = 'Stop'

      # Write rclone config for R2 from CI variables (string array avoids here-string indent pitfalls)
      $cfgDir = Join-Path $env:USERPROFILE ".config/rclone"
      New-Item -ItemType Directory -Force -Path $cfgDir | Out-Null
      $cfg = @(
        "[$($env:R2_REMOTE)]"
        "type = s3"
        "provider = Cloudflare"
        "access_key_id = $($env:R2_ACCESS_KEY_ID)"
        "secret_access_key = $($env:R2_SECRET_ACCESS_KEY)"
        "endpoint = $($env:R2_ENDPOINT)"
        "acl = private"
        "no_check_bucket = true"
      ) -join "`n"
      Set-Content -Path (Join-Path $cfgDir "rclone.conf") -Value $cfg -Encoding ascii

      $version   = $env:VERSION
      $installer = $env:INSTALLER
      $sha       = $env:INSTALLER_SHA256
      $bucket    = "$($env:R2_REMOTE):$($env:R2_BUCKET)"
      $relPath   = $env:R2_RELEASES_PATH

      # No-asset guard (mirrors the hardened GitHub workflow)
      if ([string]::IsNullOrWhiteSpace($installer) -or -not (Test-Path "release/$installer")) {
        Write-Host "No installer detected — skipping R2 publish."; exit 0
      }

      # 1) Upload release assets
      & rclone copy release/ "$bucket/$relPath/$version/" -v
      if ($LASTEXITCODE -ne 0) { throw "rclone upload failed" }
      $installerUrl = "$($env:CDN_BASE_URL)/$relPath/$version/$installer"

      # 2) Pull GitHub releases (source of notes + the whatsnew feed)
      $gh = @{ 'User-Agent'='ArdysaModsTools-CI'; 'Accept'='application/vnd.github+json'; 'Authorization'="Bearer $($env:GITHUB_PAT)" }
      $releases = Invoke-RestMethod -Headers $gh -Uri "https://api.github.com/repos/$($env:GITHUB_REPO)/releases?per_page=30"
      $thisRel  = $releases | Where-Object { $_.tag_name -eq $env:CI_COMMIT_TAG } | Select-Object -First 1
      $notes    = if ($thisRel) { $thisRel.body } else { $null }
      $build    = 0
      if ($notes -and ($notes -match '(?is)builds?[^0-9]+[0-9]+(?:[^0-9]+([0-9]+))?')) {
        $nums = [regex]::Matches($notes, '[0-9]+') | ForEach-Object { [int]$_.Value }
        if ($nums) { $build = ($nums | Measure-Object -Maximum).Maximum }
      }

      # 3) Update releases.json (PowerShell stands in for jq)
      $manifest = @{ latest=''; releases=@{} }
      $raw = & rclone cat "$bucket/$relPath/releases.json" 2>$null
      if ($raw) { try { $manifest = $raw | ConvertFrom-Json -AsHashtable } catch {} }
      if (-not $manifest.releases) { $manifest.releases = @{} }
      $manifest.latest = $version
      $manifest.releases[$version] = [ordered]@{
        version         = $version
        date            = (Get-Date).ToUniversalTime().ToString('yyyy-MM-ddTHH:mm:ssZ')
        build           = $build
        installer       = $installerUrl
        portable        = $null
        installerSha256 = $sha
        portableSha256  = $null
        notes           = $notes
      }
      ($manifest | ConvertTo-Json -Depth 8) | Set-Content releases.json -Encoding utf8
      & rclone copyto releases.json "$bucket/$relPath/releases.json" -v

      # 4) Regenerate whatsnew.json (same GitHub-shaped feed the app parses)
      $items = @($releases | Where-Object { -not $_.draft } | ForEach-Object {
        [ordered]@{ tag_name=$_.tag_name; name=$_.name; body=$_.body; html_url=$_.html_url; draft=[bool]$_.draft; published_at=$_.published_at } })
      $wn = if ($items.Count -eq 0) { '[]' } else {
        $j = ConvertTo-Json $items -Depth 5; if (-not $j.TrimStart().StartsWith('[')) { "[`n$j`n]" } else { $j } }
      [IO.File]::WriteAllText("$pwd/whatsnew.json", $wn, (New-Object Text.UTF8Encoding($false)))
      & rclone copyto whatsnew.json "$bucket/config/whatsnew.json" -v

      Write-Host "Published v$version to R2 (build $build)."

# -----------------------------------------------------------------------------
# docs — sync curated docs from GitLab → public GitHub repo (docs-only)
# Runs on main when an allowlisted doc path changes. Never copies source.
# -----------------------------------------------------------------------------
sync-docs:
  stage: docs
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - README.md
        - LICENSE
        - NOTICE
        - PRIVACY.md
        - SECURITY.md
        - CHANGELOG.md
        - docs/README.md
        - docs/TROUBLESHOOTING.md
        - docs/user/**/*
  script:
    - |
      $ErrorActionPreference = 'Stop'
      $allow = @('README.md','LICENSE','NOTICE','PRIVACY.md','SECURITY.md','CHANGELOG.md',
                 'docs/README.md','docs/TROUBLESHOOTING.md','docs/user')
      $work = Join-Path $env:TEMP "ghdocs"
      Remove-Item -Recurse -Force $work -ErrorAction SilentlyContinue
      git clone --depth 1 "https://x-access-token:$($env:GITHUB_PAT)@github.com/$($env:GITHUB_REPO).git" $work
      foreach ($p in $allow) {
        if (Test-Path $p) {
          $dest = Join-Path $work $p
          New-Item -ItemType Directory -Force -Path (Split-Path $dest) | Out-Null
          Copy-Item -Recurse -Force $p $dest
        }
      }
      Push-Location $work
      git config user.email "ci@ardysamods.my.id"
      git config user.name  "Ardysa CI"
      git add -A
      if (git status --porcelain) {
        git commit -m "docs: sync from GitLab ($($env:CI_COMMIT_SHORT_SHA))"
        git push origin HEAD:main
      } else { Write-Host "No doc changes to sync." }
      Pop-Location
